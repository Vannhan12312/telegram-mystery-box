<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Interface</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #def2f1;
      color: #333;
    }

    /* Header */
    header {
      background: #0097e6;
      color: white;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
    }

    /* Navigation Bar */
    nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #f5f6fa;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #dcdde1;
    }

    nav button {
      background: none;
      border: none;
      font-size: 14px;
      color: #2f3640;
      text-align: center;
    }

    nav button img {
      width: 32px;
      height: 32px;
      display: block;
      margin: 0 auto 5px;
    }

    .content {
      padding: 20px;
      padding-bottom: 80px; /* Avoid overlap with navigation bar */
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <div>Balance: <span id="balance">982,092</span></div>
    <div>Speed: <span id="speed">810,133/day</span></div>
  </header>

  <main class="content">
    <div id="home" class="section active">
      <h2>Home</h2>
      <p>Welcome to the game!</p>
    </div>
    <div id="wallet" class="section">
      <h2>Wallet</h2>
      <p>View your balance and transactions.</p>
    </div>
    <div id="quest" class="section">
      <h2>Quest</h2>
      <p>Complete tasks to earn rewards.</p>
    </div>
    <div id="boat" class="section">
      <h2>Boat</h2>
      <p>Manage your boats and equipment.</p>
    </div>
    <div id="shop" class="section">
      <h2>Shop</h2>
      <p>Buy items and upgrades.</p>
    </div>
  </main>

  <nav>
    <button onclick="navigate('home')">
      <img src="home-icon.png" alt="Home">
      Home
    </button>
    <button onclick="navigate('wallet')">
      <img src="wallet-icon.png" alt="Wallet">
      Wallet
    </button>
    <button onclick="navigate('quest')">
      <img src="quest-icon.png" alt="Quest">
      Quest
    </button>
    <button onclick="navigate('boat')">
      <img src="boat-icon.png" alt="Boat">
      Boat
    </button>
    <button onclick="navigate('shop')">
      <img src="shop-icon.png" alt="Shop">
      Shop
    </button>
  </nav>

  <script>
    function navigate(section) {
      document.querySelectorAll('.section').forEach((sec) => sec.classList.remove('active'));
      document.getElementById(section).classList.add('active');
    }
  </script>
</body>
</html>
