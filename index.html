<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rost & Flame - Telegram Mini Game</title>
  <style>
    * {
      box-sizing: border-box; 
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    body {
      background: #fafafa;
      font-size: 14px;
    }
    header {
      background: #f55742; 
      color: #fff;
      text-align: center;
      padding: 10px;
    }
    nav {
      display: flex;
      justify-content: space-around;
      background: #efefef;
      padding: 10px 0;
    }
    nav button {
      border: none;
      background: #fff;
      padding: 10px;
      cursor: pointer;
      flex: 1;
      font-weight: bold;
    }
    nav .active-tab {
      background: #c3f0d1;
    }
    main {
      padding: 10px;
      display: none;
    }
    main.active {
      display: block;
    }
    .hero-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 10px;
    }
    .hero-card {
      text-align: center;
      border: 1px solid #ddd;
      padding: 5px;
      border-radius: 5px;
      background: #fff;
    }
    .hero-card img {
      max-width: 50px;
      margin: 5px auto;
    }
    footer {
      text-align: center;
      padding: 10px;
      background: #f4f4f4;
    }
  </style>
</head>
<body>
  <header>
    <h1>Rost & Flame</h1>
    <p>The Ultimate Telegram Mini Game</p>
  </header>

  <nav>
    <button class="active-tab" onclick="switchTab('home')">Home</button>
    <button onclick="switchTab('shop')">Shop</button>
    <button onclick="switchTab('boat')">Boat</button>
    <button onclick="switchTab('quest')">Quest</button>
    <button onclick="switchTab('wallet')">Wallet</button>
  </nav>

  <main id="home" class="active">
    <p>Welcome to Rost & Flame. Explore and build your hero collection!</p>
    <div id="player-summary"></div>
  </main>

  <main id="shop">
    <h2>Shop</h2>
    <p>Buy chests to expand your hero collection.</p>
    <button onclick="buyChest(10)">Buy 10 Chests</button>
    <p id="shop-message"></p>
  </main>

  <main id="boat">
    <h2>Boat</h2>
    <div class="hero-container" id="hero-list"></div>
  </main>

  <main id="quest">
    <h2>Quests</h2>
    <div id="quest-list"></div>
  </main>

  <main id="wallet">
    <h2>Wallet</h2>
    <p>Manage your tokens and perform swaps.</p>
    <p>RFM Tokens: <span id="wallet-tokens">100</span></p>
  </main>

  <footer>
    &copy; 2023 Rost & Flame
  </footer>

  <script>
    const player = {
      tokens: 100,
      heroes: [
        { name: "Hero 1", img: "https://i.imgur.com/wY0nzE9.png" },
        { name: "Hero 2", img: "https://i.imgur.com/Iy1X8r1.png" }
      ],
      quests: [
        { id: 1, name: "Complete Tutorial", completed: false, reward: 10 },
      ]
    };

    function switchTab(tabId) {
      document.querySelectorAll('main').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active-tab');
      if (tabId === 'home') updateHome();
      if (tabId === 'boat') updateBoat();
    }

    function updateHome() {
      document.getElementById('player-summary').textContent = `Tokens: ${player.tokens}, Heroes: ${player.heroes.length}`;
    }

    function updateBoat() {
      const container = document.getElementById('hero-list');
      container.innerHTML = player.heroes.map(hero => `
        <div class="hero-card">
          <img src="${hero.img}" alt="${hero.name}" />
          <p>${hero.name}</p>
        </div>`).join('');
    }

    function buyChest(count) {
      if (player.tokens >= count * 10) {
        player.tokens -= count * 10;
        for (let i = 0; i < count; i++) {
          player.heroes.push({ name: `Hero ${player.heroes.length + 1}`, img: "https://i.imgur.com/Xsqp1Zl.png" });
        }
        updateHome();
        updateBoat();
      } else {
        alert("Not enough tokens!");
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateHome();
    });
  </script>
</body>
</html>
