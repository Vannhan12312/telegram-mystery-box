<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyP2E - Hero Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
      overflow: hidden;
    }

    header {
      background: #4caf50;
      color: white;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 100px);
    }

    #contentArea {
      flex-grow: 1;
      overflow-y: auto;
      padding: 10px;
      background: #ffffff;
      border-top: 1px solid #ccc;
    }

    .tabPage {
      display: none;
    }

    .tabPage.active {
      display: block;
    }

    .heroCard, .shopCard {
      display: flex;
      align-items: center;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fdfdfd;
    }

    .heroCard img, .shopCard img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      margin-right: 10px;
    }

    .heroDetails, .shopDetails {
      flex-grow: 1;
    }

    .heroActions, .shopActions button {
      margin-left: 10px;
      padding: 5px 10px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .heroActions button:hover, .shopActions button:hover {
      background: #388e3c;
    }

    #footerTabs {
      display: flex;
      justify-content: space-around;
      background: #4caf50;
      color: white;
      padding: 10px 0;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    #footerTabs button {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
    }

    #footerTabs button img {
      width: 28px;
      height: 28px;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <header>
    <div>Balance: <span id="balance">100.00</span> TON</div>
    <div>Player: HouseMaster</div>
  </header>

  <div id="app">
    <div id="contentArea">
      <!-- Hero Management -->
      <div id="tabHero" class="tabPage active">
        <h2>Hero Management</h2>
        <div id="heroList"></div>
      </div>

      <!-- Shop -->
      <div id="tabShop" class="tabPage">
        <h2>Shop</h2>
        <h3>Houses</h3>
        <div id="shopHouseList"></div>
        <h3>Buy Boxes</h3>
        <button onclick="buyBox()">Buy Box (2 TON)</button>
        <div id="boxResults" style="margin-top: 20px;"></div>
      </div>
    </div>

    <div id="footerTabs">
      <button onclick="navigate('tabHero')">
        <img src="https://via.placeholder.com/28/4caf50?text=Hero" alt="Hero">
        Heroes
      </button>
      <button onclick="navigate('tabShop')">
        <img src="https://via.placeholder.com/28/4caf50?text=Shop" alt="Shop">
        Shop
      </button>
    </div>
  </div>

  <script>
    // Navigation
    function navigate(tabId) {
      document.querySelectorAll('.tabPage').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
    }

    // Hero Data
    const heroData = [
      { name: "SlimeKid", rarity: "Common", img: "https://i.imgur.com/wY0nzE9.png", stats: { atk: 3, def: 1, hp: 10 }, element: "🌱" },
      { name: "FireCrab", rarity: "Rare", img: "https://i.imgur.com/3l9MKIl.png", stats: { atk: 5, def: 3, hp: 15 }, element: "🔥" },
      { name: "SharkWar", rarity: "Epic", img: "https://i.imgur.com/02jTwGp.png", stats: { atk: 8, def: 5, hp: 25 }, element: "💧" },
      { name: "InfernoCrab", rarity: "Legendary", img: "https://i.imgur.com/23DhlYC.png", stats: { atk: 12, def: 7, hp: 40 }, element: "🔥" },
      { name: "ElderDragon", rarity: "Mythic", img: "https://i.imgur.com/tFzK3iu.png", stats: { atk: 18, def: 10, hp: 60 }, element: "🌟" }
    ];

    // House Data
    const houseData = [
      { name: "Tiny House", img: "https://i.imgur.com/lT8vtE6.png", cost: 20, rent: 2 },
      { name: "Medium House", img: "https://i.imgur.com/NEhWHbW.png", cost: 50, rent: 5 },
      { name: "Luxury Villa", img: "https://i.imgur.com/lLJ7gXk.png", cost: 100, rent: 10 }
    ];

    // Render Hero List
    function renderHeroList() {
      const container = document.getElementById("heroList");
      container.innerHTML = "";

      heroData.forEach(hero => {
        const heroCard = document.createElement("div");
        heroCard.classList.add("heroCard");

        const heroImg = document.createElement("img");
        heroImg.src = hero.img;
        heroCard.appendChild(heroImg);

        const heroDetails = document.createElement("div");
        heroDetails.classList.add("heroDetails");
        heroDetails.innerHTML = `
          <div><strong>${hero.name}</strong> <span class="heroRarity">(${hero.rarity})</span></div>
          <div class="heroStats">⚔ ATK: ${hero.stats.atk}, 🛡 DEF: ${hero.stats.def}, ❤ HP: ${hero.stats.hp}</div>
          <div>Element: ${hero.element}</div>
        `;
        heroCard.appendChild(heroDetails);

        const heroActions = document.createElement("div");
        heroActions.classList.add("heroActions");
        const selectBtn = document.createElement("button");
        selectBtn.textContent = "Select";
        selectBtn.onclick = () => alert(`Selected Hero: ${hero.name}`);
        heroActions.appendChild(selectBtn);

        heroCard.appendChild(heroActions);

        container.appendChild(heroCard);
      });
    }

    // Render Houses in Shop
    function renderShopHouses() {
      const container = document.getElementById("shopHouseList");
      container.innerHTML = "";

      houseData.forEach(house => {
        const shopCard = document.createElement("div");
        shopCard.classList.add("shopCard");

        const shopImg = document.createElement("img");
        shopImg.src = house.img;
        shopCard.appendChild(shopImg);

        const shopDetails = document.createElement("div");
        shopDetails.classList.add("shopDetails");
        shopDetails.innerHTML = `
          <div><strong>${house.name}</strong></div>
          <div>Cost: ${house.cost} TON, Rent: ${house.rent} TON/day</div>
        `;
        shopCard.appendChild(shopDetails);

        const shopActions = document.createElement("div");
        shopActions.classList.add("shopActions");
        const buyBtn = document.createElement("button");
        buyBtn.textContent = "Buy";
        buyBtn.onclick = () => alert(`Bought ${house.name}`);
        shopActions.appendChild(buyBtn);

        shopCard.appendChild(shopActions);

        container.appendChild(shopCard);
      });
    }

    // Buy Box
    function buyBox() {
      const randomHero = heroData[Math.floor(Math.random() * heroData.length)];
      const container = document.getElementById("boxResults");
      container.innerHTML = `
        <h4>You got:</h4>
        <div class="heroCard">
          <img src="${randomHero.img}" alt="${randomHero.name}">
          <div>
            <strong>${randomHero.name}</strong> (${randomHero.rarity})
            <div>⚔ ATK: ${randomHero.stats.atk}, 🛡 DEF: ${randomHero.stats.def}, ❤ HP: ${randomHero.stats.hp}</div>
          </div>
        </div>
      `;
    }

    // Initialize
    document.addEventListener("DOMContentLoaded", () => {
      renderHeroList();
      renderShopHouses();
    });
  </script>
</body>
</html>
