<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rost & Flame - Nested Buttons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #a9d6e5, #457b9d);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            color: #f4f4f4;
        }
        .header img {
            width: 150px;
            height: auto;
            margin-top: 10px;
        }
        .stats {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .stats p {
            margin: 8px 0;
            font-size: 16px;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .button {
            padding: 10px 15px;
            background: #457b9d;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            position: relative;
        }
        .button:hover {
            background: #1d3557;
        }
        .dropdown {
            display: none;
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            background: #2a9d8f;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        .dropdown button {
            display: block;
            margin: 5px 0;
            background: #1d3557;
            padding: 8px;
            font-size: 14px;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        .dropdown button:hover {
            background: #0d2538;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Rost & Flame</h1>
            <img src="https://example.com/ice-phoenix.png" alt="Ice Phoenix">
            <p id="userInfo">Welcome, Ice Phoenix Keeper</p>
        </div>

        <!-- Stats Section -->
        <div class="stats">
            <p><strong>💰 Balance:</strong> <span id="tonBalance">100 TON</span></p>
        </div>

        <!-- Actions Section -->
        <div class="actions">
            <div class="button" onclick="toggleDropdown(this)">
                🐉 Train Phoenix
                <div class="dropdown">
                    <button onclick="trainQuick()">Quick Training</button>
                    <button onclick="trainSpecial()">Special Training</button>
                </div>
            </div>
            <div class="button" onclick="toggleDropdown(this)">
                🌟 Special Actions
                <div class="dropdown">
                    <button onclick="serveVipPhoenix()">Serve VIP Phoenix</button>
                    <button onclick="boostPhoenix()">Boost Phoenix Power</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let user = {
            tonBalance: 100,
        };

        function toggleDropdown(button) {
            const dropdown = button.querySelector('.dropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        function trainQuick() {
            alert("Quick training complete! You earned 0.5 TON.");
            user.tonBalance += 0.5;
            updateStats();
        }

        function trainSpecial() {
            alert("Special training complete! You earned 1 TON.");
            user.tonBalance += 1;
            updateStats();
        }

        function serveVipPhoenix() {
            alert("VIP Phoenix served! You earned 5 TON.");
            user.tonBalance += 5;
            updateStats();
        }

        function boostPhoenix() {
            alert("Phoenix power boosted! Special abilities unlocked.");
        }

        function updateStats() {
            document.getElementById("tonBalance").textContent = `${user.tonBalance.toFixed(1)} TON`;
        }
    </script>
</body>
</html>
