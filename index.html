<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COST & FLAME - P2E Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0e0e0e;
      color: #f1f1f1;
      font-size: 14px;
      overflow: hidden;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-around;
      background: #292929;
      padding: 5px 0;
      overflow-x: auto;
    }

    nav button {
      border: none;
      padding: 5px;
      background: #1a1a1a;
      color: #f1f1f1;
      cursor: pointer;
      border-radius: 5px;
      font-size: 12px;
      font-weight: bold;
      transition: background 0.3s;
    }

    nav button:hover {
      background: #3e3e3e;
    }

    nav .active-tab {
      background: #00cc66;
      color: #fff;
    }

    main {
      display: none;
      flex-grow: 1;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 10px;
      overflow-y: auto;
    }

    main.active {
      display: block;
    }

    .hero-container {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 10px 0;
      scroll-snap-type: x mandatory;
    }

    .hero-card {
      width: 100px;
      height: 140px;
      background: #292929;
      border: 1px solid #444;
      border-radius: 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 5px;
      scroll-snap-align: start;
      transition: transform 0.3s;
    }

    .hero-card:hover {
      transform: translateY(-5px);
    }

    .hero-card img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 5px;
    }

    .hero-card p {
      font-size: 10px;
      text-align: center;
      margin: 0;
      color: #fff;
    }

  </style>
</head>
<body>
  <nav>
    <button class="active-tab" onclick="switchTab('home')">Home</button>
    <button onclick="switchTab('shop')">Shop</button>
    <button onclick="switchTab('heroes')">Heroes</button>
    <button onclick="switchTab('settings')">Settings</button>
    <button onclick="switchTab('more')">More</button>
  </nav>

  <main id="home" class="active">
    <h2>Welcome to the Game</h2>
    <p>Manage your heroes, complete quests, and dominate the leaderboard.</p>
  </main>

  <main id="shop">
    <h2>Shop</h2>
    <p>Buy hero packs to grow your collection.</p>
    <button onclick="buyChest(1)">Buy 1 Pack</button>
    <button onclick="buyChest(5)">Buy 5 Packs</button>
  </main>

  <main id="heroes">
    <h2>Your Heroes</h2>
    <div class="hero-container" id="hero-list"></div>
  </main>

  <main id="settings">
    <h2>Settings</h2>
    <button onclick="toggleSound()">Toggle Sound</button>
    <button onclick="changeTheme()">Change Theme</button>
  </main>

  <main id="more">
    <h2>More Options</h2>
    <button onclick="switchTab('quests')">Quests</button>
    <button onclick="switchTab('leaderboard')">Leaderboard</button>
    <button onclick="switchTab('marketplace')">Marketplace</button>
    <button onclick="switchTab('pvp')">PvP</button>
  </main>

  <script>
    const player = {
      tokens: 100,
      heroes: [],
    };

    const allHeroData = [
      { name: "SlimeKid", rarity: "Common", img: "https://i.imgur.com/wY0nzE9.png", level: 1 },
      { name: "FireCrab", rarity: "Rare", img: "https://i.imgur.com/3l9MKIl.png", level: 1 },
      { name: "WaterShield", rarity: "Epic", img: "https://i.imgur.com/H65ycJW.png", level: 1 }
    ];

    function switchTab(tabId) {
      document.querySelectorAll("main").forEach(tab => tab.classList.remove("active"));
      document.querySelector(`#${tabId}`).classList.add("active");
    }

    function buyChest(count) {
      const cost = 10 * count;
      if (player.tokens < cost) {
        alert("Not enough tokens!");
        return;
      }
      player.tokens -= cost;
      for (let i = 0; i < count; i++) {
        const hero = { ...allHeroData[Math.floor(Math.random() * allHeroData.length)] };
        player.heroes.push(hero);
      }
      updateHeroList();
    }

    function updateHeroList() {
      const heroList = document.getElementById("hero-list");
      if (player.heroes.length === 0) {
        heroList.innerHTML = "<p>No heroes yet. Buy packs to get heroes!</p>";
        return;
      }
      heroList.innerHTML = player.heroes.map(hero => `
        <div class="hero-card">
          <img src="${hero.img}" alt="${hero.name}">
          <p>${hero.name}</p>
          <p>Lv${hero.level}</p>
        </div>
      `).join("");
    }

    function toggleSound() {
      alert("Sound toggled!");
    }

    function changeTheme() {
      alert("Theme changed!");
    }

    document.addEventListener("DOMContentLoaded", () => {
      updateHeroList();
    });
  </script>
</body>
</html>
