<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>R&F Merge Game - Full 50 Heroes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* RESET */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    /* LOADING SCREEN */
    #loadingScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: url('https://i.imgur.com/gguz2yw.png') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      z-index: 99999;
    }
    #loadingLogo {
      margin-bottom: 20px;
      width: 120px;
      height: 120px;
      background: url('https://i.imgur.com/4spxSKK.png') center/contain no-repeat;
    }
    #loadingBarOuter {
      width: 60%;
      max-width: 300px;
      height: 10px;
      background: rgba(0,0,0,0.3);
      margin-bottom: 40px;
      border-radius: 5px;
      overflow: hidden;
    }
    #loadingBarInner {
      width: 0%;
      height: 100%;
      background: #ff8800;
      transition: width 0.2s;
    }
    /* MAIN APP */
    #app {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #f5f5f5;
      overflow: hidden;
    }
    /* TOP NAV */
    #topBar {
      height: 50px;
      background: #222;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-around;
    }
    #topBar .navBtn {
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 4px;
      background: #333;
      margin: 0 6px;
      font-weight: bold;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #topBar .navBtn:hover {
      background: #444;
    }
    #topBar .navBtn.active {
      background: #ff7a00;
    }
    /* CONTENT AREA */
    #contentArea {
      position: absolute;
      top: 50px;
      left: 0;
      width: 100%;
      height: calc(100% - 50px);
      overflow-y: auto;
      background: #fff;
    }
    .tabPage {
      display: none;
      padding: 10px;
    }
    .tabPage.show {
      display: block;
    }
    /* HERO GRID (4 columns) */
    #heroGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .heroCard {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
    }
    .heroCard img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 4px;
    }
    .heroName {
      margin: 2px 0;
      font-weight: bold;
    }
    .heroLv {
      margin-bottom: 2px;
      font-weight: bold;
    }
    .heroStats {
      font-size: 10px;
      line-height: 1.2;
    }
    /* SHOP */
    .houseList {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .houseItem {
      border: 1px solid #ccc;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .houseItem button {
      background: #f57c00;
      color: #fff;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <!-- LOADING SCREEN -->
  <div id="loadingScreen">
    <div id="loadingLogo"></div>
    <div id="loadingBarOuter">
      <div id="loadingBarInner"></div>
    </div>
  </div>

  <div id="app">
    <div id="topBar">
      <div class="navBtn active" data-tab="tabHome">🏠 Home</div>
      <div class="navBtn" data-tab="tabHero">⚔ Hero</div>
      <div class="navBtn" data-tab="tabFarm">🚜 Farm</div>
      <div class="navBtn" data-tab="tabShop">🏷 Shop</div>
      <div class="navBtn" data-tab="tabWallet">💰 Wallet</div>
    </div>

    <div id="contentArea">
      <div id="tabHome" class="tabPage show">
        <h2>Home</h2>
        <p>Số dư TON: <span id="tokenDisplay">100</span></p>
        <p>Farm Level: <span id="farmLevelHome">1</span></p>
        <p>Số Hero hiện có: <span id="heroCount">0</span></p>
      </div>

      <div id="tabHero" class="tabPage">
        <h3>Hero Collection</h3>
        <button onclick="buyBox(1)">Mua 1 Box (2 TON)</button>
        <button onclick="buyBox(5)">Mua 5 Box (8 TON)</button>
        <button onclick="buyBox(10)">Mua 10 Box (15 TON)</button>
        <div id="heroGrid"></div>
      </div>

      <div id="tabFarm" class="tabPage">
        <h3>My Farm</h3>
        <p>Nội dung farm giữ nguyên</p>
      </div>

      <div id="tabShop" class="tabPage">
        <h3>Shop</h3>
        <div class="houseList">
          <div class="houseItem">
            <span>Tiny House (20 TON)</span>
            <button onclick="buyHouse('Tiny House', 20)">Buy</button>
          </div>
          <div class="houseItem">
            <span>Pen House (50 TON)</span>
            <button onclick="buyHouse('Pen House', 50)">Buy</button>
          </div>
          <div class="houseItem">
            <span>Villa (100 TON)</span>
            <button onclick="buyHouse('Villa', 100)">Buy</button>
          </div>
        </div>
      </div>

      <div id="tabWallet" class="tabPage">
        <h4>Wallet</h4>
        <p>Nội dung ví giữ nguyên</p>
      </div>
    </div>
  </div>

  <script>
    const recipientWallet = "UQBzUchMP1OWSQUD4_pvKk7pA10wcEA_zf--e6EIVlnwdKeq";
    let token = 100;

    document.getElementById("tokenDisplay").innerText = token;

    async function connectWallet() {
      try {
        const wallet = await Ton.Web.connectWallet();
        const walletAddress = wallet.accounts[0].address;
        alert(`Đã kết nối ví: ${walletAddress}`);
        return walletAddress;
      } catch (error) {
        alert("Kết nối ví thất bại!");
        console.error(error);
        return null;
      }
    }

    async function sendTransaction(from, amount, description) {
      try {
        const response = await Ton.Web.sendTransaction({
          from,
          to: recipientWallet,
          value: amount * 1e9,
          message: description,
        });
        if (response.status === "success") {
          alert("Thanh toán thành công!");
          return true;
        } else {
          alert("Thanh toán thất bại.");
          return false;
        }
      } catch (error) {
        alert("Có lỗi xảy ra khi thực hiện giao dịch!");
        console.error(error);
        return false;
      }
    }

    async function buyBox(qty) {
      const prices = { 1: 2, 5: 8, 10: 15 };
      const cost = prices[qty];
      const walletAddress = await connectWallet();
      if (!walletAddress) return;

      const success = await sendTransaction(walletAddress, cost, `Mua ${qty} box`);
      if (success) {
        alert(`Bạn đã mua thành công ${qty} box!`);
        token -= cost;
        document.getElementById("tokenDisplay").innerText = token;
      }
    }

    async function buyHouse(name, cost) {
      const walletAddress = await connectWallet();
      if (!walletAddress) return;

      const success = await sendTransaction(walletAddress, cost, `Mua nhà ${name}`);
      if (success) {
        alert(`Bạn đã mua thành công ${name}!`);
        token -= cost;
        document.getElementById("tokenDisplay").innerText = token;
      }
    }
  </script>
</body>
</html>
