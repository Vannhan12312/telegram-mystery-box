<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rost & Flame - Telegram Mini Game</title>
  <style>
    * {
      box-sizing: border-box; 
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    body {
      background: #fafafa;
      font-size: 14px;
    }
    header {
      background: #f55742; 
      color: #fff;
      text-align: center;
      padding: 10px;
    }
    nav {
      display: flex;
      justify-content: space-around;
      background: #efefef;
      padding: 10px 0;
    }
    nav button {
      border: none;
      background: #fff;
      padding: 10px;
      cursor: pointer;
      flex: 1;
      font-weight: bold;
    }
    nav .active-tab {
      background: #c3f0d1;
    }
    main {
      padding: 10px;
      display: none;
    }
    main.active {
      display: block;
    }

    /* Hero grid (5 columns) */
    .hero-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      justify-items: center;
    }
    .hero-card {
      text-align: center;
      border: 1px solid #ddd;
      padding: 5px;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      overflow: hidden;
      width: 90px; /* Rộng nhỏ hơn để hiển thị vừa trên mini app */
      height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .hero-card img {
      margin-top: 5px;
      width: 50px; /* Tùy chỉnh nhỏ hơn */
      height: 50px; 
      object-fit: cover;
      border-radius: 4px;
    }
    .hero-card p {
      margin: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px; 
    }
    footer {
      text-align: center;
      padding: 10px;
      background: #f4f4f4;
    }
    #modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      position: relative;
      width: 220px;
    }
    #modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px;
      background: #ddd;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    .color-common {
      color: #AAAAAA;
    }
    .color-rare {
      color: #54FFFE;
    }
    .color-epic {
      color: #C66CC5;
    }
    .color-legendary {
      color: #FFA800;
    }
    .color-mythic {
      color: #FF0000;
    }
  </style>
</head>
<body>
  <header>
    <h1>Rost & Flame</h1>
    <p>The Ultimate Telegram Mini Game</p>
  </header>

  <nav>
    <button class="active-tab" onclick="switchTab('home')">Home</button>
    <button onclick="switchTab('shop')">Shop</button>
    <button onclick="switchTab('hero')">Hero</button>
    <button onclick="switchTab('quest')">Quest</button>
    <button onclick="switchTab('wallet')">Wallet</button>
  </nav>

  <main id="home" class="active">
    <p>Welcome to Rost & Flame. Explore and build your hero collection!</p>
    <div id="player-summary"></div>
    <button onclick="addTokens(100)" style="margin-top: 10px; padding: 5px 10px;">Get 100 Tokens</button>
  </main>

  <main id="shop">
    <h2>Shop</h2>
    <p>Buy chests to expand your hero collection. (10 tokens per chest)</p>
    <button onclick="buyChest(1)">Buy 1 Chest</button>
    <button onclick="buyChest(10)">Buy 10 Chests</button>
    <p id="shop-message"></p>
  </main>

  <main id="hero">
    <h2>Hero</h2>
    <div class="hero-container" id="hero-list"></div>
  </main>

  <main id="quest">
    <h2>Quests</h2>
    <div id="quest-list"></div>
  </main>

  <main id="wallet">
    <h2>Wallet</h2>
    <p>Manage your tokens and perform swaps.</p>
    <p>RFM Tokens: <span id="wallet-tokens">100</span></p>
  </main>

  <div id="modal-overlay">
    <div id="modal-content">
      <button id="modal-close" onclick="closeModal()">X</button>
      <h3>Hero Details</h3>
      <img id="modal-hero-img" src="" alt="Hero" style="max-width: 80px; margin: 10px 0;" />
      <p id="modal-hero-name" style="font-weight: bold;"></p>
      <p id="modal-hero-rarity"></p>
      <p id="modal-hero-attr"></p>
      <p id="modal-hero-stats"></p>
      <p id="modal-hero-level"></p>
    </div>
  </div>

  <footer>
    &copy; 2023 Rost & Flame
  </footer>

    /**************************************************************
     * RARITY CHANCES
     **************************************************************/
    const rarityChances = [
      { rarity: 'Common',    chance: 40 }, // 40%
      { rarity: 'Rare',      chance: 30 }, // 30%
      { rarity: 'Epic',      chance: 15 }, // 15%
      { rarity: 'Legendary', chance: 10 }, // 10%
      { rarity: 'Mythic',    chance: 5  }, // 5%
    ];

    /**************************************************************
     * TABS
     **************************************************************/
    function switchTab(tabId) {
      document.querySelectorAll('main').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active-tab');
      if (tabId === 'home') updateHome();
      if (tabId === 'hero') updateHero();
      if (tabId === 'quest') updateQuest();
    }

    /**************************************************************
     * HOME + TOKENS
     **************************************************************/
    function updateHome() {
      document.getElementById('player-summary').textContent = `Tokens: ${player.tokens}`;
      document.getElementById('wallet-tokens').textContent = player.tokens;
    }
    function addTokens(amount) {
      player.tokens += amount;
      updateHome();
      alert(`${amount} tokens added!`);
    }

    /**************************************************************
     * SHOP
     **************************************************************/
    function buyChest(count) {
      const cost = count * 10; 
      if (player.tokens >= cost) {
        player.tokens -= cost;
        for (let i = 0; i < count; i++) {
          const rarity = getRandomRarity();
          // Lọc hero theo rarity
          const sameRarityHeroes = allHeroData.filter(h => h.rarity === rarity);
          if(sameRarityHeroes.length>0) {
            const randomIndex = Math.floor(Math.random()*sameRarityHeroes.length);
            const newHero = { ...sameRarityHeroes[randomIndex] };
            player.heroes.push(newHero);
          }
        }
        updateHome();
        updateHero();
        document.getElementById('shop-message').textContent = `You bought ${count} chest(s)!`;
      } else {
        alert("Not enough tokens!");
      }
    }
    function getRandomRarity() {
      const roll = Math.random() * 100;
      let cumulativeChance = 0;
      for (const rc of rarityChances) {
        cumulativeChance += rc.chance;
        if (roll < cumulativeChance) return rc.rarity;
      }
      return 'Common';
    }

    /**************************************************************
     * HERO
     **************************************************************/
    function updateHero() {
      const container = document.getElementById('hero-list');
      container.innerHTML = player.heroes.map((hero, index) => {
        const rarityClass = hero.rarity.toLowerCase();
        return `
          <div class="hero-card" onclick="showHeroDetails(${index})">
            <img src="${hero.img}" alt="${hero.name}" />
            <p class="color-${rarityClass}">${hero.name}</p>
            <p>${hero.symbol} Lv${hero.level}</p>
          </div>
        `;
      }).join('');
    }

    function showHeroDetails(index) {
      const hero = player.heroes[index];
      document.getElementById('modal-hero-img').src = hero.img;
      document.getElementById('modal-hero-name').textContent = hero.name;
      document.getElementById('modal-hero-rarity').innerHTML = `<span class="color-${hero.rarity.toLowerCase()}">${hero.rarity}</span>`;
      document.getElementById('modal-hero-attr').textContent = `Attribute: ${hero.symbol} ${hero.attribute}`;
      document.getElementById('modal-hero-stats').textContent = `⚔ ${hero.damage}  💨 ${hero.speed}`;
      document.getElementById('modal-hero-level').textContent = `Level: ${hero.level}`;
      document.getElementById('modal-overlay').style.display = 'flex';
    }
    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    /**************************************************************
     * QUEST
     **************************************************************/
    function updateQuest() {
      const qDiv = document.getElementById('quest-list');
      qDiv.innerHTML = player.quests.map(q => {
        return `
          <div style="border:1px solid #ddd;margin:4px;padding:4px;">
            <strong>${q.name}</strong>
            <p>Reward: ${q.reward} tokens</p>
            <p>Status: ${q.completed ? 'Done' : 'Ongoing'}</p>
            ${!q.completed ? 
              `<button onclick="completeQuest(${q.id})">Complete</button>` : ''
            }
          </div>
        `;
      }).join('');
    }
    function completeQuest(id){
      const quest = player.quests.find(q=>q.id===id);
      if(quest && !quest.completed){
        quest.completed=true;
        player.tokens += quest.reward;
        updateHome();
        updateQuest();
        alert(`Quest done, +${quest.reward} tokens!`);
      }
    }

    /**************************************************************
     * INIT
     **************************************************************/
    document.addEventListener('DOMContentLoaded', () => {
      updateHome();
      updateHero();
      updateQuest();
    });
  </script>
</body>
</html>
