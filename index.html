<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rost & Flame - Mini Telegram</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* RESET */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    body {
      background: #fafafa;
      color: #333;
      font-size: 14px;
      width:100%; 
      height:100%;
      overflow:auto;
    }

    header {
      text-align:center;
      background:#f55742; color:#fff;
      padding:10px;
    }
    nav {
      display:flex;
      justify-content:space-around;
      background:#efefef;
    }
    nav button {
      flex:1; border:none; background:#fff; padding:8px; cursor:pointer; font-weight:bold;
    }
    .active-tab { background:#c3f0d1; }

    main { display:none; padding:8px; }
    main.active { display:block; }

    /* HERO GRID: 5 hero / row => each hero-card must be small */
    .hero-container {
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:4px;
      justify-items:center;
    }
    .hero-card {
      width:50px; 
      height:80px;
      background:#fff;
      border:1px solid #ddd;
      border-radius:4px;
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      justify-content:flex-start;
      cursor:pointer;
      overflow:hidden; 
      padding:2px;
    }
    .hero-card img {
      width:36px; 
      height:36px;
      object-fit:cover; 
      border-radius:3px;
    }
    .hero-card p {
      margin:2px 0; 
      font-size:10px; 
      line-height:1.2;
      text-align:center; 
      white-space:nowrap;
      overflow:hidden; 
      text-overflow:ellipsis;
      max-width:100%;
    }

    footer {
      text-align:center;
      padding:10px;
      background:#f4f4f4;
    }

    /* MODAL */
    #modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.5);
      display:none;
      justify-content:center; 
      align-items:center;
      z-index:9999;
    }
    #modal-content {
      background:#fff; 
      padding:10px; 
      border-radius:6px; 
      width:200px; 
      position:relative; 
      text-align:center;
    }
    #modal-close {
      position:absolute; top:5px; right:5px; 
      background:#ddd; border:none; 
      cursor:pointer; 
      border-radius:4px; 
      padding:2px 5px;
    }
    #modal-hero-img { width:60px; height:60px; object-fit:cover; border-radius:4px; }

    /* Rarity colors */
    .color-common { color:#999; }
    .color-rare { color:#54FFFE; }
    .color-epic { color:#C66CC5; }
    .color-legendary { color:#FFA800; }
    .color-mythic { color:#FF0000; }

  </style>
</head>
<body>
  <header>
    <h1>Rost & Flame</h1>
    <p>Mini Telegram Game</p>
  </header>

  <nav>
    <button class="active-tab" onclick="switchTab('home')">Home</button>
    <button onclick="switchTab('shop')">Shop</button>
    <button onclick="switchTab('hero')">Hero</button>
    <button onclick="switchTab('quest')">Quest</button>
    <button onclick="switchTab('wallet')">Wallet</button>
  </nav>

  <!-- HOME -->
  <main id="home" class="active">
    <p>Welcome to Rost & Flame!</p>
    <div id="player-summary"></div>
    <button onclick="addTokens(100)" style="margin-top:10px;">Get +100 Tokens</button>
  </main>

  <!-- SHOP -->
  <main id="shop">
    <h3>Shop</h3>
    <p>Buy chest (10 tokens each). Random hero from 50 total. 5 rarities with probabilities:</p>
    <button onclick="buyChest(1)">Buy 1 Chest</button>
    <button onclick="buyChest(5)">Buy 5 Chest</button>
    <button onclick="buyChest(10)">Buy 10 Chest</button>
    <p id="shop-message"></p>
  </main>

  <!-- HERO -->
  <main id="hero">
    <h3>Your Heroes</h3>
    <div class="hero-container" id="hero-list"></div>
  </main>

  <!-- QUEST -->
  <main id="quest">
    <h3>Quests</h3>
    <div id="quest-list"></div>
  </main>

  <!-- WALLET -->
  <main id="wallet">
    <h3>Wallet</h3>
    <p>Token: <span id="wallet-tokens"></span></p>
  </main>

  <!-- MODAL -->
  <div id="modal-overlay">
    <div id="modal-content">
      <button id="modal-close" onclick="closeModal()">X</button>
      <img id="modal-hero-img" src="" alt="Hero" />
      <p id="modal-hero-name" style="font-weight:bold;"></p>
      <p id="modal-hero-rarity"></p>
      <p id="modal-hero-attr"></p>
      <p id="modal-hero-stats"></p>
      <p id="modal-hero-level"></p>
    </div>
  </div>

  <footer>
    &copy; 2023 Rost & Flame
  </footer>

    /***********************************************************
     * RARITY CHANCES
     ***********************************************************/
    const rarityChances = [
      { rarity: 'Common',    chance: 40 },
      { rarity: 'Rare',      chance: 30 },
      { rarity: 'Epic',      chance: 15 },
      { rarity: 'Legendary', chance: 10 },
      { rarity: 'Mythic',    chance: 5  },
    ];

    /***********************************************************
     * TABS
     ***********************************************************/
    function switchTab(tabId){
      document.querySelectorAll('main').forEach(m=>m.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active-tab'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active-tab');
      if(tabId==='home') updateHome();
      if(tabId==='hero') updateHero();
      if(tabId==='quest') updateQuest();
    }

    /***********************************************************
     * HOME
     ***********************************************************/
    function updateHome(){
      document.getElementById('player-summary').textContent=`Tokens: ${player.tokens}`;
      document.getElementById('wallet-tokens').textContent=player.tokens;
    }
    function addTokens(amount){
      player.tokens+=amount;
      updateHome();
      alert(`+${amount} tokens!`);
    }

    /***********************************************************
     * SHOP
     ***********************************************************/
    function buyChest(count){
      const cost = 10*count;
      if(player.tokens<cost){
        alert("Not enough tokens!");
        return;
      }
      player.tokens-=cost;
      for(let i=0;i<count;i++){
        const rar = getRandomRarity();
        const pool = allHeroData.filter(h=>h.rarity===rar);
        if(pool.length>0){
          const rIndex=Math.floor(Math.random()*pool.length);
          const newHero={...pool[rIndex]};
          player.heroes.push(newHero);
        }
      }
      autoMergeHeroes(); // Tự động hợp nhất sau khi thêm hero
      updateHome();
      updateHero();
      document.getElementById('shop-message').textContent=`You bought ${count} chest(s). Merged automatically if duplicates.`;
    }
    function getRandomRarity(){
      const roll=Math.random()*100;
      let accum=0;
      for(let i=0;i<rarityChances.length;i++){
        accum+=rarityChances[i].chance;
        if(roll<accum) return rarityChances[i].rarity;
      }
      return 'Common';
    }

    /***********************************************************
     * TỰ ĐỘNG HỢP NHẤT (Auto Merge)
     * - Ghép 2 hero cùng name + level + rarity => level up => damage +50% (nếu < lv5)
     * - Lặp cho đến khi không còn cặp trùng
     ***********************************************************/
    function autoMergeHeroes(){
      // Gom group = key: name+rarity+level => list index
      let groupMap={};
      player.heroes.forEach((h,idx)=>{
        let key=`${h.name}__${h.rarity}__Lv${h.level}`;
        if(!groupMap[key]) groupMap[key]=[];
        groupMap[key].push(idx);
      });

      // Lặp qua từng group; while length>=2 => merge
      for(const key in groupMap){
        let indices = groupMap[key];
        while(indices.length>=2){
          const i1=indices.pop(); 
          const i2=indices.pop();

          // Lấy hero => merge
          let h1 = player.heroes[i1];
          // Xóa hero cũ (chú ý thứ tự pop -> splice)
          // slice index lớn trước => index2 > index1
          const biggerIdx=Math.max(i1,i2);
          const smallerIdx=Math.min(i1,i2);
          player.heroes.splice(biggerIdx,1);
          player.heroes.splice(smallerIdx,1);

          // Tạo hero level+1
          let mergedHero={...h1};
          if(mergedHero.level<5) {
            mergedHero.level++;
            mergedHero.damage=Math.floor(mergedHero.damage*1.5); // +50% damage
          }
          // speed tùy bạn => v.d k tăng / or mergedHero.speed= Math.floor( mergedHero.speed*1.2 ) ...
          
          // Thay hero cũ = hero merged => push
          player.heroes.push(mergedHero);
        }
      }
    }

    /***********************************************************
     * HERO
     ***********************************************************/
    function updateHero(){
      const container=document.getElementById('hero-list');
      container.innerHTML= player.heroes.map((h,idx)=>{
        const rarClass=`color-${h.rarity.toLowerCase()}`;
        return `
          <div class="hero-card" onclick="showHeroDetails(${idx})">
            <img src="${h.img}" alt="${h.name}">
            <p class="${rarClass}">${h.name}</p>
            <p>Lv${h.level}</p>
          </div>`;
      }).join('');
    }

    function showHeroDetails(index){
      const h=player.heroes[index];
      document.getElementById('modal-hero-img').src=h.img;
      document.getElementById('modal-hero-name').textContent=h.name;
      document.getElementById('modal-hero-rarity').innerHTML=`<span class="color-${h.rarity.toLowerCase()}">${h.rarity}</span>`;
      document.getElementById('modal-hero-attr').textContent=`${h.symbol} ${h.attribute}`;
      document.getElementById('modal-hero-stats').textContent=`🔪 ${h.damage}  🏃‍♂️ ${h.speed}`;
      document.getElementById('modal-hero-level').textContent=`Level: ${h.level}`;
      document.getElementById('modal-overlay').style.display='flex';
    }
    function closeModal(){
      document.getElementById('modal-overlay').style.display='none';
    }

    /***********************************************************
     * QUEST
     ***********************************************************/
    function updateQuest(){
      const qDiv=document.getElementById('quest-list');
      qDiv.innerHTML=player.quests.map(q=>{
        return `
          <div style="border:1px solid #ccc; margin:4px; padding:4px;">
            <strong>${q.name}</strong> 
            <p>Reward: ${q.reward}</p>
            <p>${q.completed?'Done':'Ongoing'}</p>
            ${!q.completed? `<button onclick="completeQuest(${q.id})">Finish</button>`:''}
          </div>
        `;
      }).join('');
    }
    function completeQuest(id){
      let q=player.quests.find(x=>x.id===id);
      if(q && !q.completed){
        q.completed=true;
        player.tokens+=q.reward;
        alert(`Quest done, +${q.reward} tokens!`);
        updateHome();
        updateQuest();
      }
    }

    /***********************************************************
     * INIT
     ***********************************************************/
    document.addEventListener('DOMContentLoaded',()=>{
      updateHome();
      updateHero();
      updateQuest();
    });
  </script>
</body>
</html>
