<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Fishing P2E - Farm Logic</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #a9d6e5, #457b9d);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            color: #f4f4f4;
        }
        .header img {
            width: 150px;
            height: auto;
            margin-top: 10px;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
        }
        .menu button {
            background: #2a9d8f;
            border: none;
            border-radius: 5px;
            padding: 10px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
        }
        .menu button:hover {
            background: #1d3557;
        }
        .farmContainer {
            margin: 20px 0;
        }
        .farmHouse {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .farmHouse .info {
            text-align: left;
            font-size: 14px;
        }
        .farmHouse button {
            background: #ff9933;
            border: none;
            border-radius: 5px;
            padding: 6px 10px;
            color: #fff;
            cursor: pointer;
        }
        .farmHouse button:hover {
            background: #ffa64d;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>Idle Fishing P2E</h1>
        <p>Welcome, <span id="playerName">Player</span>!</p>
    </div>

    <!-- Farm Container -->
    <div class="container farmContainer">
        <h3>Your Farm</h3>
        <div id="farmList"></div>
    </div>

    <!-- Menu -->
    <div class="menu">
        <button onclick="collectAllIncome()">Collect All</button>
        <button onclick="openShop()">Shop</button>
        <button onclick="openWallet()">Wallet</button>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        // Mock Data
        let player = {
            name: "FishingMaster",
            balance: 100,
            farm: [
                { name: "Tiny House", income: 0.1, level: 1, collected: 0 },
                { name: "Medium House", income: 0.5, level: 1, collected: 0 },
                { name: "Large House", income: 1, level: 1, collected: 0 },
            ],
        };

        // Update Player Name
        document.getElementById("playerName").innerText = player.name;

        // Render Farm
        function renderFarm() {
            const farmList = document.getElementById("farmList");
            farmList.innerHTML = "";
            player.farm.forEach((house, index) => {
                const houseDiv = document.createElement("div");
                houseDiv.className = "farmHouse";
                houseDiv.innerHTML = `
                    <div class="info">
                        <strong>${house.name}</strong> (Level ${house.level})<br>
                        Income: ${house.income} TON/sec<br>
                        Collected: ${house.collected.toFixed(2)} TON
                    </div>
                    <div>
                        <button onclick="collectIncome(${index})">Collect</button>
                        <button onclick="upgradeHouse(${index})">Upgrade</button>
                    </div>
                `;
                farmList.appendChild(houseDiv);
            });
        }

        // Collect Income
        function collectIncome(index) {
            const house = player.farm[index];
            player.balance += house.collected;
            house.collected = 0;
            showNotification(`Collected ${house.collected.toFixed(2)} TON from ${house.name}`);
            renderFarm();
        }

        // Collect All Income
        function collectAllIncome() {
            player.farm.forEach((house) => {
                player.balance += house.collected;
                house.collected = 0;
            });
            showNotification("Collected all income!");
            renderFarm();
        }

        // Upgrade House
        function upgradeHouse(index) {
            const house = player.farm[index];
            const upgradeCost = house.level * 10;
            if (player.balance >= upgradeCost) {
                player.balance -= upgradeCost;
                house.level++;
                house.income += house.level * 0.1; // Increase income per upgrade
                showNotification(`Upgraded ${house.name} to Level ${house.level}`);
                renderFarm();
            } else {
                showNotification("Not enough balance to upgrade!");
            }
        }

        // Notification
        function showNotification(message) {
            const notification = document.getElementById("notification");
            notification.innerText = message;
            notification.style.display = "block";
            setTimeout(() => {
                notification.style.display = "none";
            }, 2000);
        }

        // Simulate Income
        setInterval(() => {
            player.farm.forEach((house) => {
                house.collected += house.income;
            });
            renderFarm();
        }, 1000);

        // Initialize
        renderFarm();
    </script>
</body>
</html>
