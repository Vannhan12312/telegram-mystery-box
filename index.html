<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rost & Flame - Telegram Mini Game</title>
  <style>
    * {
      box-sizing: border-box; 
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    body {
      background: #fafafa;
      font-size: 14px;
    }
    header {
      background: #f55742; 
      color: #fff;
      text-align: center;
      padding: 10px;
    }
    nav {
      display: flex;
      justify-content: space-around;
      background: #efefef;
      padding: 10px 0;
    }
    nav button {
      border: none;
      background: #fff;
      padding: 10px;
      cursor: pointer;
      flex: 1;
      font-weight: bold;
    }
    nav .active-tab {
      background: #c3f0d1;
    }
    main {
      padding: 10px;
      display: none;
    }
    main.active {
      display: block;
    }
    .hero-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
    .hero-card {
      text-align: center;
      border: 1px solid #ddd;
      padding: 5px;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      overflow: hidden;
    }
    .hero-card img {
      max-width: 50px;
      margin: 5px auto;
    }
    .hero-card p {
      margin: 5px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    footer {
      text-align: center;
      padding: 10px;
      background: #f4f4f4;
    }
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      position: relative;
    }
    #modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px;
      background: #ddd;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    .color-common {
      color: #AAAAAA;
    }
    .color-rare {
      color: #54FFFE;
    }
    .color-epic {
      color: #C66CC5;
    }
    .color-legendary {
      color: #FFA800;
    }
    .color-mythic {
      color: #FF0000;
    }
  </style>
</head>
<body>
  <header>
    <h1>Rost & Flame</h1>
    <p>The Ultimate Telegram Mini Game</p>
  </header>

  <nav>
    <button class="active-tab" onclick="switchTab('home')">Home</button>
    <button onclick="switchTab('shop')">Shop</button>
    <button onclick="switchTab('boat')">Boat</button>
    <button onclick="switchTab('quest')">Quest</button>
    <button onclick="switchTab('wallet')">Wallet</button>
  </nav>

  <main id="home" class="active">
    <p>Welcome to Rost & Flame. Explore and build your hero collection!</p>
    <div id="player-summary"></div>
  </main>

  <main id="shop">
    <h2>Shop</h2>
    <p>Buy chests to expand your hero collection.</p>
    <button onclick="buyChest(10)">Buy 10 Chests</button>
    <p id="shop-message"></p>
  </main>

  <main id="boat">
    <h2>Boat</h2>
    <div class="hero-container" id="hero-list"></div>
  </main>

  <main id="quest">
    <h2>Quests</h2>
    <div id="quest-list"></div>
  </main>

  <main id="wallet">
    <h2>Wallet</h2>
    <p>Manage your tokens and perform swaps.</p>
    <p>RFM Tokens: <span id="wallet-tokens">100</span></p>
  </main>

  <div id="modal-overlay">
    <div id="modal-content">
      <button id="modal-close" onclick="closeModal()">X</button>
      <h3>Hero Details</h3>
      <img id="modal-hero-img" src="" alt="Hero" style="max-width: 100px; margin: 10px 0;" />
      <p id="modal-hero-name" style="font-weight: bold;"></p>
      <p id="modal-hero-damage"></p>
      <p id="modal-hero-skill"></p>
      <p id="modal-hero-earn"></p>
    </div>
  </div>

  <footer>
    &copy; 2023 Rost & Flame
  </footer>

  <script>
    const player = {
      tokens: 100,
      heroes: Array(25).fill().map((_, i) => ({
        name: `Hero ${i + 1}`,
        rarity: ['Common', 'Rare', 'Epic', 'Legendary', 'Mythic'][i % 5],
        img: `https://i.imgur.com/placeholder-${i + 1}.png`,
        attribute: ['Fire', 'Water', 'Earth', 'Wind', 'Electric'][i % 5],
        symbol: ['🔥', '💧', '🌎', '🍃', '⚡'][i % 5],
        earnRate: Math.floor(Math.random() * 10 + 5),
        level: 1
      })),
      quests: [
        { id: 1, name: "Complete Tutorial", completed: false, reward: 10 },
      ]
    };

    function switchTab(tabId) {
      document.querySelectorAll('main').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active-tab');
      if (tabId === 'home') updateHome();
      if (tabId === 'boat') updateBoat();
    }

    function updateHome() {
      document.getElementById('player-summary').textContent = `Tokens: ${player.tokens}, Heroes: ${player.heroes.length}`;
    }

    function updateBoat() {
      const container = document.getElementById('hero-list');
      container.innerHTML = player.heroes.map((hero, index) => `
        <div class="hero-card" onclick="showHeroDetails(${index})">
          <img src="${hero.img}" alt="${hero.name}" />
          <p class="color-${hero.rarity.toLowerCase()}">${hero.name} (${hero.rarity})</p>
          <p>${hero.symbol} ${hero.attribute}</p>
        </div>`).join('');
    }

    function showHeroDetails(index) {
      const hero = player.heroes[index];
      document.getElementById('modal-hero-img').src = hero.img;
      document.getElementById('modal-hero-name').textContent = `${hero.name} (${hero.symbol} ${hero.attribute})`;
      document.getElementById('modal-hero-damage').textContent = `Damage: ⚔ ${Math.floor(Math.random() * 100) + 50}`;
      document.getElementById('modal-hero-skill').textContent = `Skill: Special Move`;
      document.getElementById('modal-hero-earn').textContent = `Farm Rate: ${hero.earnRate} tokens/day`;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateHome();
      updateBoat();
    });
  </script>
</body>
</html>
