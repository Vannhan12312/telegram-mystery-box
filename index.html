<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rost & Flame - Ice Phoenix</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            color: white;
            overflow: hidden;
        }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }
        .loading-screen img {
            width: 300px;
            animation: float 3s infinite;
        }
        @keyframes float {
            0%, 100% {
                transform: translateY(-10px);
            }
            50% {
                transform: translateY(10px);
            }
        }
        .loading-screen h1 {
            font-size: 24px;
            margin: 20px 0;
        }
        .loading-screen.fade-out {
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        header {
            background: #ff6347;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
        .container {
            margin: 20px auto;
            text-align: center;
        }
        button {
            padding: 15px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }
        .play-btn {
            background: #ff4500;
        }
        .play-btn:hover {
            background: #e63946;
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading-screen">
        <img src="https://via.placeholder.com/300/ffffff/000000?text=Ice+Phoenix" alt="Ice Phoenix">
        <h1>The Ice Phoenix Awakens...</h1>
    </div>
    <header>🔥 Rost & Flame 🔥</header>
    <div class="container" id="game" style="display: none;">
        <h2>Welcome to Rost & Flame</h2>
        <button class="play-btn" onclick="startGame()">Play Now</button>
    </div>

    <audio id="phoenix-sound" src="https://www.soundjay.com/nature/phoenix-cry.mp3"></audio>

    <script>
        // Hiệu ứng màn hình loading
        window.onload = () => {
            const loadingScreen = document.getElementById('loading-screen');
            const phoenixSound = document.getElementById('phoenix-sound');

            phoenixSound.play(); // Phát âm thanh Phượng Hoàng
            setTimeout(() => {
                loadingScreen.classList.add('fade-out');
                document.getElementById('game').style.display = 'block'; // Hiển thị game sau khi loading
            }, 4000); // Hiển thị loading trong 4 giây
        };

        function startGame() {
            alert("Game Started! Enjoy Rost & Flame!");
        }
    </script>
</body>
</html>
