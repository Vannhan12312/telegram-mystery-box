<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>R&F Merge MiniApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* RESET */
    * {
      box-sizing: border-box;
      margin: 0; 
      padding: 0;
      font-family: sans-serif;
    }
    html, body {
      width: 100%; 
      height: 100%; 
      background: #000; 
      overflow: hidden;
    }
    /* LOADING SCREEN */
    #loadingScreen {
      position: fixed; 
      top: 0; left: 0; 
      width: 100vw; height: 100vh;
      background: url('https://i.imgur.com/gguz2yw.png') center/cover no-repeat;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: flex-end; 
      z-index: 99999;
    }
    #loadingLogo {
      margin-bottom: 20px;
      width: 120px; 
      height: 120px;
      background: url('https://i.imgur.com/4spxSKK.png') center/contain no-repeat;
    }
    #loadingBarOuter {
      width: 60%; 
      max-width: 300px; 
      height: 10px; 
      background: rgba(0,0,0,0.3);
      margin-bottom: 40px;
      border-radius: 5px; 
      overflow: hidden;
    }
    #loadingBarInner {
      width: 0%; 
      height: 100%; 
      background: #ff8800; 
      transition: width 0.2s;
    }

    /* MAIN APP */
    #app {
      display: none;
      position: relative;
      width: 100vw; 
      height: 100vh;
      background: #f5f5f5;
      overflow: hidden;
    }
    /* TOP NAV (4 nút) */
    #topBar {
      height: 50px; 
      background: #222;
      color: #fff;
      display: flex; 
      align-items: center; 
      justify-content: space-around;
    }
    #topBar .navBtn {
      cursor: pointer; 
      padding: 8px 14px; 
      border-radius: 4px;
      background: #333;
      margin: 0 6px;
      font-weight: bold;
      transition: background 0.2s;
    }
    #topBar .navBtn:hover {
      background: #444;
    }
    #topBar .navBtn.active {
      background: #ff7a00;
    }

    /* CONTENT */
    #contentArea {
      position: absolute; 
      top: 50px; 
      left: 0; 
      width: 100%; 
      height: calc(100% - 50px);
      overflow-y: auto; 
      background: #fff;
    }
    .tabPage {
      display: none; 
      padding: 10px;
    }
    .tabPage.show {
      display: block;
    }

    /* HERO GRID (4 columns, no gap) */
    #heroGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }
    .heroCard {
      border: 1px solid #ddd;
      width: 100%;
      height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
    }
    .heroCard img {
      width: 50px; 
      height: 50px; 
      object-fit: cover; 
      border-radius: 4px;
    }
    .heroName {
      margin: 2px 0; 
      font-weight: bold;
    }
    .heroLv {
      margin-bottom: 2px;
      font-weight: bold;
    }
    .heroStats {
      font-size: 10px; 
      line-height: 1.2;
    }

    /* Rarity colors (bold) */
    .rarity-common { color: #999; font-weight:bold; }
    .rarity-rare { color: #0ff; font-weight:bold; }
    .rarity-epic { color: #c66cc5; font-weight:bold; }
    .rarity-legendary { color: #ffa600; font-weight:bold; }
    .rarity-mythic { color: #f00; font-weight:bold; }

    /* MODAL */
    #heroModalOverlay {
      position: fixed; 
      top: 0; left: 0; 
      width: 100vw; 
      height: 100vh; 
      background: rgba(0,0,0,0.5);
      display: none; 
      justify-content: center; 
      align-items: center;
      z-index: 999999;
    }
    #heroModal {
      background: #fff;
      border-radius: 6px;
      padding: 10px;
      width: 240px;
      text-align: center;
      position: relative;
    }
    #heroModal img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px; 
      margin-bottom: 8px;
    }
    #heroModalClose {
      position: absolute; 
      top: 5px; 
      right: 5px; 
      cursor: pointer; 
      background: #ddd; 
      border: none; 
      border-radius: 4px; 
      padding: 2px 6px;
    }
    /* House style placeholder */
    .houseList {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .houseItem {
      border: 1px solid #ccc;
      padding: 6px;
      display: flex; 
      align-items: center; 
      justify-content: space-between;
    }
    .houseItem button {
      background: #f57c00; 
      color:#fff; 
      border:none; 
      border-radius:4px; 
      padding:4px 8px; 
      cursor:pointer;
    }
  </style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <div id="loadingLogo"></div>
  <div id="loadingBarOuter">
    <div id="loadingBarInner"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- NAV -->
  <div id="topBar">
    <div class="navBtn" data-tab="tabHome">🏠</div>
    <div class="navBtn" data-tab="tabHero">⚔</div>
    <div class="navBtn" data-tab="tabShop">🏷</div>
    <div class="navBtn" data-tab="tabWallet">💰</div>
  </div>

  <!-- CONTENT -->
  <div id="contentArea">
    <!-- HOME -->
    <div id="tabHome" class="tabPage show">
      <!-- Xóa mọi text demo, chỉ để trống hay vài icon tùy thích -->
      <h3 style="display:none;"></h3>
      <p style="display:none;"></p>
      <p id="tokenDisplay" style="display:none;"></p>
    </div>

    <!-- HERO -->
    <div id="tabHero" class="tabPage">
      <!-- Xóa text cũ, chỉ hiển thị grid -->
      <div id="heroGrid"></div>
    </div>

    <!-- SHOP -->
    <div id="tabShop" class="tabPage">
      <!-- Ẩn text cũ, thêm nút buy chest -->
      <div style="display:flex;gap:8px;">
        <button onclick="buyChest(1)" style="font-weight:bold;">⏳ x1</button>
        <button onclick="buyChest(5)" style="font-weight:bold;">⏳ x5</button>
      </div>
      <hr>
      <!-- 3 House -->
      <div class="houseList">
        <div class="houseItem">
          <span><b>Tiny House</b> (20 TON)</span>
          <button onclick="buyHouse('Tiny',20)">Buy</button>
        </div>
        <div class="houseItem">
          <span><b>Pen House</b> (50 TON)</span>
          <button onclick="buyHouse('Pen',50)">Buy</button>
        </div>
        <div class="houseItem">
          <span><b>Villa</b> (100 TON)</span>
          <button onclick="buyHouse('Villa',100)">Buy</button>
        </div>
      </div>
    </div>

    <!-- WALLET -->
    <div id="tabWallet" class="tabPage">
      <p style="display:none;"></p>
    </div>
  </div>
</div>

<!-- HERO MODAL -->
<div id="heroModalOverlay">
  <div id="heroModal">
    <button id="heroModalClose" onclick="closeHeroModal()">X</button>
    <img id="heroModalImg" src="" alt="hero">
    <h4 id="heroModalName" style="margin:4px 0;"></h4>
    <p id="heroModalLv" style="margin:4px 0;"></p>
    <p id="heroModalStats" style="margin:4px 0;"></p>
    <p id="heroModalElement" style="margin:4px 0;"></p>
  </div>
</div>

<script>
/* LOADING 3s */
let loadPct=0;
const loadInterval=setInterval(()=>{
  loadPct+=5;
  if(loadPct>100) loadPct=100;
  document.getElementById('loadingBarInner').style.width=loadPct+'%';
},200);

setTimeout(()=>{
  clearInterval(loadInterval);
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('app').style.display='block';
},3000);

/* BASIC DATA */
let token=100; 
document.getElementById('tokenDisplay').innerText="🪙 "+token;
let heroList=[];

/* House buy example */
function buyHouse(name,cost){
  alert("You bought "+name+" with "+cost+" TON (demo).");
}

/* NAV switch */
document.querySelectorAll('#topBar .navBtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    let tab=btn.getAttribute('data-tab');
    document.querySelectorAll('.tabPage').forEach(pg=>pg.classList.remove('show'));
    document.querySelectorAll('.navBtn').forEach(x=>x.classList.remove('active'));
    document.getElementById(tab).classList.add('show');
    btn.classList.add('active');
    if(tab==='tabHero') renderHeroes();
  });
});

/* Hero pool (demo 50) + chance */
const heroPool = {
  Common:[
    {name:"SlimeBaby",rarity:"Common",img:"https://i.imgur.com/3AIUH3J.png",dmg:18,spd:8,hp:25,mp:4,element:"💧"},
    {name:"ShellMin",rarity:"Common",img:"https://i.imgur.com/wY0nzE9.png",dmg:20,spd:10,hp:30,mp:5,element:"🌱"},
    // (Thêm ... cho đủ 10)
  ],
  Rare:[
    {name:"CoralWar",rarity:"Rare",img:"https://i.imgur.com/Iy1X8r1.png",dmg:35,spd:14,hp:50,mp:8,element:"💧"},
    {name:"KrakenKid",rarity:"Rare",img:"https://i.imgur.com/cSy6okk.png",dmg:36,spd:15,hp:52,mp:9,element:"🦑"},
    // ...
  ],
  Epic:[
    {name:"ShellBuster",rarity:"Epic",img:"https://i.imgur.com/02jTwGp.png",dmg:50,spd:17,hp:60,mp:12,element:"🐚"},
    // ...
  ],
  Legendary:[
    {name:"InfernoCrab",rarity:"Legendary",img:"https://i.imgur.com/23DhlYC.png",dmg:60,spd:20,hp:80,mp:15,element:"🔥"},
    // ...
  ],
  Mythic:[
    {name:"ElderDragon",rarity:"Mythic",img:"https://i.imgur.com/tFzK3iu.png",dmg:80,spd:25,hp:100,mp:20,element:"🐉"},
    // ...
  ]
};
const chances = [
  {rar:"Common",pct:40},
  {rar:"Rare",pct:30},
  {rar:"Epic",pct:15},
  {rar:"Legendary",pct:10},
  {rar:"Mythic",pct:5},
];

/* BUY CHEST => random hero => autoMerge => render */
function buyChest(qty){
  let cost=qty*10;
  if(token<cost){ alert("Not enough tokens"); return; }
  token-=cost;
  document.getElementById('tokenDisplay').innerText="🪙 "+token;
  for(let i=0;i<qty;i++){
    let h = randomHero();
    heroList.push({...h,lv:1});
    autoMergeHeroes();
  }
  renderHeroes();
}
/* randomHero by chance */
function randomHero(){
  let roll=Math.random()*100; let sum=0;
  for(let c of chances){
    sum+=c.pct;
    if(roll<sum){
      let arr=heroPool[c.rar];
      let i=Math.floor(Math.random()*arr.length);
      return JSON.parse(JSON.stringify(arr[i]));
    }
  }
  // fallback
  return JSON.parse(JSON.stringify(heroPool.Common[0]));
}
/* autoMerge if 2 hero same name+lv => lv+1 & stats*1.5 => remove dup */
function autoMergeHeroes(){
  let map={};
  heroList.forEach((h,i)=>{
    let k=h.name+"|"+(h.lv||1);
    if(!map[k]) map[k]=[];
    map[k].push(i);
  });
  for(let k in map){
    let arr=map[k];
    while(arr.length>=2){
      let i1=arr.pop(); 
      let i2=arr.pop();
      let h1=heroList[i1];
      h1.lv=(h1.lv||1)+1;
      h1.dmg=Math.floor(h1.dmg*1.5);
      h1.spd=Math.floor(h1.spd*1.5);
      h1.hp=Math.floor(h1.hp*1.5);
      h1.mp=Math.floor(h1.mp*1.5);
      // remove i2
      heroList.splice(i2,1);
      arr=arr.map(x=> x>i2? x-1:x);
    }
  }
}

/* render 4-col no gap, hero stats in bold + colored */
function renderHeroes(){
  let g=document.getElementById('heroGrid');
  g.innerHTML="";
  heroList.forEach((h,idx)=>{
    let card=document.createElement('div');
    card.classList.add('heroCard');
    // rarity class
    let rc="rarity-common";
    if(h.rarity==="Rare") rc="rarity-rare";
    if(h.rarity==="Epic") rc="rarity-epic";
    if(h.rarity==="Legendary") rc="rarity-legendary";
    if(h.rarity==="Mythic") rc="rarity-mythic";
    card.innerHTML=`
      <img src="${h.img}" alt="${h.name}">
      <div class="heroName ${rc}"><b>${h.name}</b></div>
      <div class="heroLv ${rc}">Lv${h.lv} [${h.rarity}]</div>
      <div class="heroStats">
        <b>⚔${h.dmg}</b> <b>✨${h.spd}</b> <b>♥${h.hp}</b> <b>🔮${h.mp}</b><br>
        <b>${h.element||""}</b>
      </div>
    `;
    card.onclick=()=>openHeroModal(idx);
    g.appendChild(card);
  });
}

/* openHeroModal */
function openHeroModal(i){
  let h=heroList[i];
  document.getElementById('heroModalOverlay').style.display='flex';
  document.getElementById('heroModalImg').src=h.img;
  let rc="rarity-common";
  if(h.rarity==="Rare") rc="rarity-rare";
  if(h.rarity==="Epic") rc="rarity-epic";
  if(h.rarity==="Legendary") rc="rarity-legendary";
  if(h.rarity==="Mythic") rc="rarity-mythic";
  document.getElementById('heroModalName').innerHTML=`
    <span class="${rc}"><b>${h.name}</b></span>
  `;
  document.getElementById('heroModalLv').innerHTML=`
    <span class="${rc}"><b>Lv${h.lv} [${h.rarity}]</b></span>
  `;
  document.getElementById('heroModalStats').innerHTML=`
    <b>⚔${h.dmg}</b> <b>✨${h.spd}</b> <b>♥${h.hp}</b> <b>🔮${h.mp}</b>
  `;
  document.getElementById('heroModalElement').innerHTML=`
    <b>${h.element||""}</b>
  `;
}
function closeHeroModal(){
  document.getElementById('heroModalOverlay').style.display='none';
}
</script>

</body>
</html>
