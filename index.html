<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Ice Box</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom, #1c92d2, #f2fcfe);
            overflow: hidden;
        }
        .box-container {
            text-align: center;
        }
        .magic-box {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: url('https://source.unsplash.com/200x200/?ice,box') no-repeat center/cover;
            border: 3px solid #fff;
            border-radius: 20px;
            box-shadow: 0 0 20px #4fc3f7, 0 0 40px #ffcc00;
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px #4fc3f7; }
            50% { box-shadow: 0 0 40px #ffcc00; }
        }
        .open-btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            color: #fff;
            background: linear-gradient(to right, #4fc3f7, #1c92d2);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .open-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(to right, #1c92d2, #4fc3f7);
        }
        .reward {
            margin-top: 20px;
            display: none;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 10px #4fc3f7;
        }
    </style>
</head>
<body>
    <div class="box-container">
        <div class="magic-box" id="magicBox"></div>
        <button class="open-btn" id="openBtn">Open Box</button>
        <div class="reward" id="rewardBox"></div>
    </div>

    <script>
        const openBtn = document.getElementById('openBtn');
        const rewardBox = document.getElementById('rewardBox');
        const rewards = [
            { name: 'Frozen Sword', type: 'NFT', rarity: 'Rare' },
            { name: 'Flaming Shield', type: 'NFT', rarity: 'Epic' },
            { name: '50 Tokens', type: 'Token', rarity: 'Common' },
            { name: 'Ice Phoenix', type: 'NFT', rarity: 'Legendary' }
        ];

        openBtn.addEventListener('click', () => {
            openBtn.disabled = true;
            rewardBox.style.display = 'none';

            setTimeout(() => {
                const reward = rewards[Math.floor(Math.random() * rewards.length)];
                rewardBox.innerHTML = `
                    🎁 You received: <strong>${reward.name}</strong><br>
                    🌟 Type: ${reward.type}<br>
                    🔥 Rarity: <strong>${reward.rarity}</strong>
                `;
                rewardBox.style.display = 'block';
                openBtn.disabled = false;
            }, 2000);
        });
    </script>
</body>
</html>
