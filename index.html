<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Frozen Phoenix Mini App</title>
  <!-- (Các thẻ <link>, <style> tùy ý) -->
</head>
<body>
  <h1>Frozen Phoenix Mini App</h1>
  
  <!-- Nút Connect Wallet -->
  <button id="connectBtn">Connect Wallet</button>
  <!-- Nút Open Box (ẩn ban đầu) -->
  <button id="openBtn" style="display: none;">Open Box</button>

  <!-- Khu vực hiển thị thông báo hay phần thưởng -->
  <div id="rewardBox" style="display:none;"></div>

  <!-- 1) Nạp SDK: Phải đặt trước code khởi tạo -->
  <script src="tonconnect-sdk.min.js"></script>
  
  <!-- 2) Sử dụng SDK trong code -->
  <script>
    // Kiểm tra xem TonConnectSDK có tồn tại không
    console.log("TonConnectSDK:", window.TonConnectSDK);

    // Thay vì: const connector = new TonConnect();
    // Hãy dùng: const connector = new TonConnectSDK();
    // (Vì bạn đã xác nhận 'TonConnectSDK' là biến global do SDK cung cấp)
    const connector = new TonConnectSDK();

    // Ví dụ: sự kiện click "Connect Wallet"
    document.getElementById("connectBtn").addEventListener("click", async () => {
      try {
        console.log("Connect Wallet clicked!");
        // Giả sử SDK có hàm connectWallet()
        await connector.connectWallet();
        alert("Wallet connected!");
        document.getElementById("connectBtn").style.display = "none";
        document.getElementById("openBtn").style.display = "inline-block";
      } catch (err) {
        console.error("Failed to connect wallet:", err);
      }
    });

    // Ví dụ: sự kiện click "Open Box"
    document.getElementById("openBtn").addEventListener("click", async () => {
      try {
        // Gửi transaction, v.v. (tuỳ logic của bạn)
        await connector.sendTransaction({ to: "SOME_ADDRESS", value: "1000000000" });
        alert("Payment successful!");
        document.getElementById("rewardBox").style.display = "block";
        document.getElementById("rewardBox").textContent = "You got a Frost Phoenix!";
      } catch (err) {
        console.error("Payment failed:", err);
      }
    });

    // Chỗ này từng bị lỗi "..." nếu code cắt dở. Kiểm tra cẩn thận cú pháp.
    // Ví dụ: { ...spreadSyntax } phải đầy đủ, hoặc xóa "..." nếu không cần.
  </script>
</body>
</html>
