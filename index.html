<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rost & Flame</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #a9d6e5, #457b9d);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            color: #f4f4f4;
        }
        .header img {
            width: 150px;
            height: auto;
            margin-top: 10px;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
        }
        .menu button {
            background: #2a9d8f;
            border: none;
            border-radius: 5px;
            padding: 10px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
        }
        .menu button:hover {
            background: #1d3557;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .modal h3 {
            margin-bottom: 20px;
        }
        .modal button {
            background: #e63946;
            padding: 10px 20px;
            border: none;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal button:hover {
            background: #d62828;
        }
        .shop-item {
            background: #2a9d8f;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }
        .shop-item button {
            background: #e63946;
            padding: 5px 10px;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>Rost & Flame</h1>
        <img src="https://example.com/ice-phoenix.png" alt="Ice Phoenix">
        <p id="userInfo">Welcome, Ice Phoenix Keeper</p>
    </div>

    <!-- Menu -->
    <div class="menu">
        <button onclick="openModal('walletModal')">Wallet</button>
        <button onclick="openModal('questModal')">Quest</button>
        <button onclick="openModal('homeModal')">Home</button>
        <button onclick="openModal('boatModal')">Boat</button>
        <button onclick="openModal('shopModal')">Shop</button>
    </div>

    <!-- Modals -->
    <div class="modal" id="walletModal">
        <h3>Wallet</h3>
        <p><strong>Address:</strong> <span id="walletAddress">Not Connected</span></p>
        <p><strong>Balance:</strong> <span id="walletBalance">-- TON</span></p>
        <button onclick="connectWallet()">Connect Wallet</button>
        <button onclick="closeModal('walletModal')">Close</button>
    </div>

    <div class="modal" id="questModal">
        <h3>Quest</h3>
        <p>Complete tasks to earn rewards.</p>
        <p id="questProgress">Train 5 Phoenixes: 0/5</p>
        <button onclick="claimQuest()">Claim Reward</button>
        <button onclick="closeModal('questModal')">Close</button>
    </div>

    <div class="modal" id="homeModal">
        <h3>Home</h3>
        <p>Train Phoenixes and manage your Ice Phoenix activities here.</p>
        <button onclick="trainPhoenix()">Train Phoenix</button>
        <button onclick="closeModal('homeModal')">Close</button>
    </div>

    <div class="modal" id="boatModal">
        <h3>Boat Management</h3>
        <p>Manage and upgrade your boats here.</p>
        <button onclick="closeModal('boatModal')">Close</button>
    </div>

    <div class="modal" id="shopModal">
        <h3>Shop</h3>
        <div id="shopItems">
            <!-- Items will be dynamically loaded -->
        </div>
        <button onclick="closeModal('shopModal')">Close Shop</button>
    </div>

    <script>
        let user = {
            tonBalance: 100,
            questProgress: 0,
            walletAddress: null,
        };

        const shopItems = [
            { name: "Ice Crystal", price: 10 },
            { name: "Phoenix Feather", price: 15 },
            { name: "Mystic Flame", price: 20 },
        ];

        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'block';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function connectWallet() {
            user.walletAddress = "EQABC1234...XYZ"; // Mock wallet address
            user.walletBalance = 200; // Mock wallet balance
            document.getElementById("walletAddress").textContent = user.walletAddress;
            document.getElementById("walletBalance").textContent = `${user.walletBalance} TON`;
            alert("Wallet connected successfully!");
        }

        function trainPhoenix() {
            if (user.questProgress < 5) {
                user.questProgress++;
                user.tonBalance += 0.5;
                alert("Phoenix trained successfully! You earned 0.5 TON.");
                updateStats();
            } else {
                alert("You have already trained 5 Phoenixes today!");
            }
        }

        function claimQuest() {
            if (user.questProgress >= 5) {
                user.tonBalance += 10;
                user.questProgress = 0;
                alert("Quest reward claimed! You earned 10 TON.");
                updateStats();
            } else {
                alert("You need to train 5 Phoenixes to claim the reward.");
            }
        }

        function loadShopItems() {
            const shopContainer = document.getElementById("shopItems");
            shopContainer.innerHTML = "";
            shopItems.forEach(item => {
                const div = document.createElement("div");
                div.className = "shop-item";
                div.innerHTML = `
                    <span>${item.name} - ${item.price} TON</span>
                    <button onclick="buyItem('${item.name}', ${item.price})">Buy</button>
                `;
                shopContainer.appendChild(div);
            });
        }

        function buyItem(itemName, price) {
            if (user.tonBalance >= price) {
                user.tonBalance -= price;
                alert(`You bought ${itemName}!`);
                updateStats();
            } else {
                alert("Not enough TON to buy this item.");
            }
        }

        function updateStats() {
            document.getElementById("walletBalance").textContent = user.walletBalance || "--";
            document.getElementById("questProgress").textContent = `Train 5 Phoenixes: ${user.questProgress}/5`;
        }

        loadShopItems();
        updateStats();
    </script>
</body>
</html>
