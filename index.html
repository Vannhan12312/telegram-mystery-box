<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frozen Phoenix Mini App</title>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #1c92d2, #f2fcfe);
            color: #fff;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
        }
        .game-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
        .magic-box {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background: url('https://source.unsplash.com/200x200/?ice,box') no-repeat center/cover;
            border-radius: 20px;
            box-shadow: 0 0 20px #4fc3f7, 0 0 40px #ffcc00;
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px #4fc3f7; }
            50% { box-shadow: 0 0 40px #ffcc00; }
        }
        .open-btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            color: #fff;
            background: linear-gradient(to right, #4fc3f7, #1c92d2);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .open-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(to right, #1c92d2, #4fc3f7);
        }
        .reward {
            margin-top: 20px;
            display: none;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 10px #4fc3f7;
        }
    </style>
</head>
<body>
    <h1>Frozen Phoenix Mini App</h1>
    <div class="game-container">
        <div class="magic-box" id="magicBox"></div>
        <button class="open-btn" id="connectBtn">Connect Wallet</button>
        <button class="open-btn" id="openBtn" style="display: none;">Open Box</button>
        <div class="reward" id="rewardBox"></div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const openBtn = document.getElementById('openBtn');
        const rewardBox = document.getElementById('rewardBox');

        const TONConnect = TonConnect;
        const connector = new TONConnect();

        // Phoenix levels with probabilities
        const phoenixLevels = [
            { name: 'Ember Phoenix', level: 1, chance: 50, color: '#ff5722' },
            { name: 'Frost Phoenix', level: 2, chance: 30, color: '#4fc3f7' },
            { name: 'Glacier Phoenix', level: 3, chance: 15, color: '#29b6f6' },
            { name: 'Aurora Phoenix', level: 4, chance: 4, color: '#ab47bc' },
            { name: 'Eternal Ice Phoenix', level: 5, chance: 1, color: '#e8eaf6' }
        ];

        // Wallet address for receiving payments
        const recipientAddress = "UQBzUchMP1OWSQUD4_pvKk7pA10wcEA_zf--e6EIVlnwdKeq";

        // Connect to TON wallet
        connectBtn.addEventListener('click', async () => {
            try {
                await connector.connectWallet();
                alert('Wallet connected!');
                connectBtn.style.display = 'none';
                openBtn.style.display = 'inline-block';
            } catch (err) {
                console.error('Wallet connection failed', err);
                alert('Failed to connect wallet. Please try again.');
            }
        });

        // Generate random phoenix
        function getRandomPhoenix() {
            const random = Math.random() * 100;
            let cumulative = 0;

            for (let phoenix of phoenixLevels) {
                cumulative += phoenix.chance;
                if (random <= cumulative) {
                    return phoenix;
                }
            }
            return phoenixLevels[0]; // Default to Ember Phoenix
        }

        // Open box logic with TON payment
        openBtn.addEventListener('click', async () => {
            openBtn.disabled = true;
            rewardBox.style.display = 'none';

            try {
                // Request TON payment
                const transaction = {
                    to: recipientAddress,
                    value: '1000000000', // Amount in nanoTON (1 TON = 10^9 nanoTON)
                    data: 'Opening Frozen Phoenix Box'
                };

                await connector.sendTransaction(transaction);

                // Generate random phoenix
                const phoenix = getRandomPhoenix();
                rewardBox.innerHTML = `
                    🎁 You received: <strong style="color: ${phoenix.color}">${phoenix.name}</strong><br>
                    🌟 Level: ${phoenix.level}<br>
                    🔥 Chance: ${phoenix.chance}%
                `;
                rewardBox.style.display = 'block';
            } catch (err) {
                console.error('Payment failed', err);
                alert('Transaction failed. Please try again.');
            } finally {
                openBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
