<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Rost & Flame - Demo Mini App</title>
  <style>
    /* ====== CSS CƠ BẢN CHO DEMO ====== */
    body {
      margin: 0; 
      padding: 0; 
      font-family: sans-serif;
      background: linear-gradient(to right, #202E54, #D32F2F);
      color: #fff;
    }
    header, nav, main, footer {
      padding: 10px;
    }
    header {
      background: rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      margin: 0;
      padding: 0.5em 0;
      font-size: 1.5em;
    }
    .menu {
      display: flex;
      justify-content: space-around;
      background: rgba(255,255,255,0.1);
      margin: 5px 0;
      padding: 10px;
      border-radius: 8px;
    }
    .menu button {
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.2s;
    }
    .menu button:hover {
      background: rgba(255,255,255,0.2);
    }
    .content-section {
      display: none; /* Mặc định ẩn, khi bấm tab sẽ hiện */
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      margin-bottom: 10px;
      min-height: 200px;
    }
    .active-section {
      display: block;
    }
    /* BOX 20 Ô (5x4) */
    .box-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin: 10px 0;
    }
    .box-cell {
      background: rgba(255,255,255,0.1);
      text-align: center;
      padding: 20px;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.2s;
    }
    .box-cell:hover {
      background: rgba(255,255,255,0.3);
    }
    .hero-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .hero-card {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 5px;
      width: 160px;
      min-height: 100px;
    }
    .hero-name {
      font-weight: bold;
      margin-bottom: 5px;
    }
    .btn {
      background: #1976D2;
      border: none;
      color: #fff;
      padding: 5px 10px;
      margin-top: 5px;
      cursor: pointer;
      border-radius: 4px;
      transition: 0.2s;
    }
    .btn:hover {
      background: #0D47A1;
    }
    .section-title {
      font-size: 1.2em;
      margin-top: 0;
      border-bottom: 1px solid #eee;
      padding-bottom: 5px;
    }
    .quest-item {
      margin: 6px 0;
      background: rgba(255,255,255,0.1);
      padding: 6px;
      border-radius: 4px;
    }
    .quest-item.completed {
      opacity: 0.6;
    }
    .ref-container {
      margin-top: 10px;
      background: rgba(255,255,255,0.1);
      padding: 8px;
      border-radius: 4px;
      word-wrap: break-word;
    }
    .popup-hero {
      background: rgba(0,0,0,0.8);
      position: fixed;
      top: 0; left: 0; right:0; bottom: 0;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .popup-content {
      background: #333;
      padding: 20px;
      border-radius: 8px;
      max-width: 300px;
      text-align: center;
    }
    .close-popup {
      background: #888;
      margin-top: 10px;
    }
    .shop-item {
      margin: 5px 0;
      background: rgba(255,255,255,0.1);
      padding: 6px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .shop-item button {
      background: #F57C00;
      border: none;
      color: #fff;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
    }
    .shop-item button:hover {
      background: #E65100;
    }
    .bold {
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h1>Rost & Flame - Telegram Mini App Demo</h1>
</header>

<nav class="menu">
  <button onclick="showSection('questSection')">Quest</button>
  <button onclick="showSection('boxSection')">Box</button>
  <button onclick="showSection('heroSection')">Hero</button>
  <button onclick="showSection('shopSection')">Shop</button>
  <button onclick="showSection('profileSection')">Profile</button>
  <button onclick="showSection('refSection')">Ref</button>
</nav>

<main>
  <!-- Quest Section -->
  <div id="questSection" class="content-section">
    <h2 class="section-title">Nhiệm Vụ (Quest)</h2>
    <div id="questList"></div>
  </div>

  <!-- Box Section -->
  <div id="boxSection" class="content-section">
    <h2 class="section-title">Mở Box (20 ô)</h2>
    <p>
      Mua box hoặc mở box (nếu đã mua).  
      <button class="btn" onclick="buyBox()">Mua Box (cost 50 RFT)</button>
    </p>
    <div id="boxGrid" class="box-grid"></div>
  </div>

  <!-- Hero Section -->
  <div id="heroSection" class="content-section">
    <h2 class="section-title">Danh Sách Hero</h2>
    <div id="heroList" class="hero-list"></div>
  </div>

  <!-- Shop Section -->
  <div id="shopSection" class="content-section">
    <h2 class="section-title">Cửa Hàng (Shop)</h2>
    <div class="shop-item">
      <div>Mua Box (50 RFT)</div>
      <button onclick="buyBox()">Mua</button>
    </div>
    <div class="shop-item">
      <div>Nâng cấp Hero (10 RFT / level)</div>
      <button onclick="alert('Chọn hero trong tab Hero để nâng cấp.')">Chi tiết</button>
    </div>
  </div>

  <!-- Profile Section -->
  <div id="profileSection" class="content-section">
    <h2 class="section-title">Hồ Sơ (Profile)</h2>
    <p><span class="bold">Token (RFT):</span> <span id="tokenDisplay"></span></p>
    <button class="btn" onclick="connectWallet()">Kết Nối Ví</button>
    <button class="btn" onclick="withdrawToken()">Rút Tiền</button>
  </div>

  <!-- Ref Section -->
  <div id="refSection" class="content-section">
    <h2 class="section-title">Mời Bạn (Ref)</h2>
    <p>Sao chép link sau và gửi đến bạn bè để nhận thưởng:</p>
    <div class="ref-container" id="refLink"></div>
  </div>
</main>

<!-- Popup hero hiển thị khi mở ô box -->
<div id="heroPopup" class="popup-hero" onclick="closePopup(event)">
  <div class="popup-content" id="heroPopupContent">
    <!-- Nội dung hero mở ô box hiển thị ở đây -->
    <button class="btn close-popup" onclick="closePopup()">Đóng</button>
  </div>
</div>

<script>
/* 
  === ROST & FLAME DEMO - SINGLE HTML ===
  Tác giả: “Lão làng 50 năm kinh nghiệm” (demo)
  Mục đích: Mô phỏng cơ bản gameplay - P2E Mở Box, Quest, Hero, Shop, Profile, Ref.
  Ghi chú:
    - Dùng localStorage lưu tạm data.
    - Cơ chế rút token, kết nối ví chỉ là minh họa. 
    - Để làm thật cần backend quản lý blockchain / token.
*/

// ========== DỮ LIỆU MẪU ==========

// Danh sách hero (tên, phe, độ hiếm, level, ...). 
// 20 hero chia Băng (10) & Hỏa (10). 
// Rarity: "common", "uncommon", "rare", "legendary"
const HERO_DATABASE = [
  { name: "Glacia", faction: "Băng", rarity: "rare" },
  { name: "Frost Novak", faction: "Băng", rarity: "uncommon" },
  { name: "Snowe", faction: "Băng", rarity: "uncommon" },
  { name: "Icelyn", faction: "Băng", rarity: "common" },
  { name: "Berg", faction: "Băng", rarity: "common" },
  { name: "Glacier Rider", faction: "Băng", rarity: "rare" },
  { name: "Aurin", faction: "Băng", rarity: "common" },
  { name: "Shiva", faction: "Băng", rarity: "rare" },
  { name: "Frost Warden", faction: "Băng", rarity: "rare" },
  { name: "Blizzard", faction: "Băng", rarity: "legendary" },
  
  { name: "Flamira", faction: "Hỏa", rarity: "rare" },
  { name: "Rost", faction: "Hỏa", rarity: "uncommon" },
  { name: "Scorche", faction: "Hỏa", rarity: "uncommon" },
  { name: "Pyra", faction: "Hỏa", rarity: "common" },
  { name: "Ignis", faction: "Hỏa", rarity: "common" },
  { name: "Ash Rider", faction: "Hỏa", rarity: "rare" },
  { name: "Flame Assassin", faction: "Hỏa", rarity: "common" },
  { name: "Solaria", faction: "Hỏa", rarity: "rare" },
  { name: "Hearth Warden", faction: "Hỏa", rarity: "rare" },
  { name: "Flame", faction: "Hỏa", rarity: "legendary" }
];

// Tỉ lệ summon hero (theo rarity) 
// Gợi ý: 5% legendary, 15% rare, 30% uncommon, 50% common
// Ở code này sẽ random “toàn bộ 20 hero” - 
// Ta sẽ “quét” all hero => Tìm hero theo rarity => random. 
// Hoặc random 0-100 => check range. 
function getRandomHero() {
  let rnd = Math.random() * 100; 
  let rarity = "";
  if (rnd < 5) rarity = "legendary";
  else if (rnd < 20) rarity = "rare";
  else if (rnd < 50) rarity = "uncommon";
  else rarity = "common";

  // Lọc hero cùng rarity
  const possibleHeroes = HERO_DATABASE.filter(h => h.rarity === rarity);
  // Chọn ngẫu nhiên 1 hero trong nhóm
  const randomIndex = Math.floor(Math.random() * possibleHeroes.length);
  // Tạo 1 copy hero + thêm level = 1
  let selected = Object.assign({}, possibleHeroes[randomIndex]);
  selected.level = 1;
  return selected;
}

// Danh sách nhiệm vụ 
// (có daily, weekly, v.v. - ở đây demo đơn giản)
let questList = [
  { id: "daily1", title: "Mở 1 box", reward: 10, done: false },
  { id: "daily2", title: "Mời 1 bạn", reward: 5, done: false },
  { id: "daily3", title: "Hoàn thành 1 PvE (demo)", reward: 10, done: false },

  { id: "weekly1", title: "Nâng cấp hero lên level 5", reward: 50, done: false },
  { id: "weekly2", title: "Thu thập đủ 10 hero Băng/Hỏa", reward: 100, done: false },
];

// ========== LOCALSTORAGE & DỮ LIỆU NGƯỜI CHƠI ==========

function loadPlayerData() {
  let data = localStorage.getItem("playerData");
  if (data) {
    return JSON.parse(data);
  } else {
    // Nếu chưa có data thì khởi tạo
    return {
      token: 100,       // Cho sẵn 100 RFT
      heroes: [],       // Danh sách hero người chơi sở hữu
      quests: questList // Lưu state quest (chưa / đã done)
    };
  }
}
function savePlayerData() {
  localStorage.setItem("playerData", JSON.stringify(playerData));
}

// Khởi tạo data
let playerData = loadPlayerData();
// Lưu quest state tạm
if (!playerData.quests || playerData.quests.length !== questList.length) {
  playerData.quests = questList;
  savePlayerData();
}

// ========== HIỂN THỊ GIAO DIỆN ==========

// Ẩn/Hiện section
function showSection(sectionId) {
  const sections = document.querySelectorAll(".content-section");
  sections.forEach(sec => sec.classList.remove("active-section"));
  document.getElementById(sectionId).classList.add("active-section");
  if (sectionId === "questSection") renderQuestList();
  if (sectionId === "boxSection") renderBoxGrid();
  if (sectionId === "heroSection") renderHeroList();
  if (sectionId === "profileSection") updateProfileUI();
  if (sectionId === "refSection") updateRefLink();
}

// ===== Quest List =====
function renderQuestList() {
  let container = document.getElementById("questList");
  container.innerHTML = "";
  playerData.quests.forEach(q => {
    let div = document.createElement("div");
    div.className = "quest-item " + (q.done ? "completed" : "");
    div.innerHTML = `
      <strong>${q.title}</strong> 
      - Thưởng: ${q.reward} RFT 
      ${q.done ? " (Đã hoàn thành)" : ""}
      <br/>
      ${!q.done ? `<button onclick="completeQuest('${q.id}')">Nhận Thưởng</button>` : ""}
    `;
    container.appendChild(div);
  });
}
function completeQuest(id) {
  let quest = playerData.quests.find(q => q.id === id);
  if (quest && !quest.done) {
    quest.done = true;
    playerData.token += quest.reward;
    savePlayerData();
    renderQuestList();
    alert(`Nhận ${quest.reward} RFT thành công!`);
  }
}

// ===== Box 20 ô =====
function renderBoxGrid() {
  let grid = document.getElementById("boxGrid");
  grid.innerHTML = "";
  // Tạo 20 ô
  for (let i = 0; i < 20; i++) {
    let cell = document.createElement("div");
    cell.className = "box-cell";
    cell.textContent = "Ô " + (i+1);
    cell.onclick = function() {
      openBoxCell(i);
    };
    grid.appendChild(cell);
  }
}

// Mua box -> trừ 50 RFT
function buyBox() {
  if (playerData.token >= 50) {
    playerData.token -= 50;
    savePlayerData();
    alert("Mua Box thành công, bạn có thể click vào từng ô để mở hero!");
    showSection('boxSection');
  } else {
    alert("Không đủ RFT để mua box!");
  }
}

function openBoxCell(index) {
  // Ở demo này, cứ click ô nào cũng ra hero random, 
  // Thực tế bạn có thể “khóa” logic cho 1 box, 20 ô, v.v.
  let hero = getRandomHero();
  playerData.heroes.push(hero);
  savePlayerData();
  showHeroPopup(hero);
  checkQuestProgress_BoxOpened(); // Check quest "Mở 1 box"
}

// Check quest "Mở 1 box" => daily1
function checkQuestProgress_BoxOpened() {
  let q = playerData.quests.find(x => x.id === "daily1");
  if (q && !q.done) {
    // Đặt done, tạm cho auto done. 
    // Thực tế bạn có thể check “đã mở bao nhiêu box?”
    q.done = false; 
    // Do quest này kêu “Mở 1 box” => user vẫn phải bấm “Nhận Thưởng”
    // Chỉ update data => user quay về tab Quest => bấm nhận
    savePlayerData();
  }
}

// Popup Hero
function showHeroPopup(hero) {
  let popup = document.getElementById("heroPopup");
  let content = document.getElementById("heroPopupContent");
  content.innerHTML = `
    <h3>Bạn đã nhận được</h3>
    <p><strong>${hero.name}</strong> - [${hero.faction}]<br/>
       Rarity: ${hero.rarity}, Level: ${hero.level}</p>
    <button class="btn close-popup" onclick="closePopup()">Đóng</button>
  `;
  popup.style.display = "flex";
}
function closePopup(e) {
  // Nếu bấm ra ngoài hoặc bấm nút
  if (!e || e.target.id === "heroPopup" || e.target.classList.contains("close-popup")) {
    let popup = document.getElementById("heroPopup");
    popup.style.display = "none";
  }
}

// ===== Hero List =====
function renderHeroList() {
  let list = document.getElementById("heroList");
  list.innerHTML = "";
  playerData.heroes.forEach((h, idx) => {
    let card = document.createElement("div");
    card.className = "hero-card";
    card.innerHTML = `
      <div class="hero-name">${h.name}</div>
      <div>Phe: ${h.faction} | Rarity: ${h.rarity}</div>
      <div>Level: ${h.level}</div>
      <button class="btn" onclick="upgradeHero(${idx})">Nâng Cấp (10 RFT)</button>
    `;
    list.appendChild(card);
  });
}

// Nâng cấp hero => +1 level, -10 RFT 
function upgradeHero(index) {
  if (playerData.token < 10) {
    alert("Không đủ RFT để nâng cấp!");
    return;
  }
  playerData.token -= 10;
  playerData.heroes[index].level += 1;
  savePlayerData();
  renderHeroList();
  checkQuestProgress_Upgrade(); // Check quest "Nâng cấp hero lên level 5"
}

// Check quest “Nâng cấp hero lên level 5” => weekly1
function checkQuestProgress_Upgrade() {
  let quest = playerData.quests.find(q => q.id === "weekly1");
  if (!quest) return;
  // Xem có hero nào level >= 5 không
  let hasLv5 = playerData.heroes.some(h => h.level >= 5);
  if (hasLv5 && !quest.done) {
    // Tương tự, user phải qua tab Quest để bấm "Nhận thưởng"
    // Ở đây ta chỉ cập nhật cho biết
    quest.done = false; 
    savePlayerData();
  }
}

// ===== Profile =====
function updateProfileUI() {
  document.getElementById("tokenDisplay").textContent = playerData.token;
}

// Mô phỏng nút Kết Nối Ví
function connectWallet() {
  let addr = prompt("Nhập địa chỉ ví của bạn (demo)");
  if (addr) {
    alert("Đã kết nối ví: " + addr + " (demo)");
  }
}

// Mô phỏng rút tiền
function withdrawToken() {
  let amount = prompt("Nhập số RFT muốn rút", "0");
  let amt = parseInt(amount);
  if (!amt || amt <= 0) {
    alert("Số RFT không hợp lệ!");
    return;
  }
  if (amt > playerData.token) {
    alert("Bạn không đủ RFT!");
    return;
  }
  // Giả lập rút
  playerData.token -= amt;
  savePlayerData();
  alert(`Đã rút ${amt} RFT (demo) - Thực tế cần giao dịch on-chain!`);
  updateProfileUI();
}

// ===== Ref =====
function updateRefLink() {
  // Mô phỏng link ref => “t.me/<botname>?start=Ref1234”
  // Bạn tùy chỉnh theo bot thực tế
  let link = `https://t.me/YourBotNameHere?start=Ref1234`;
  document.getElementById("refLink").textContent = link;
  checkQuestProgress_Ref(); // Kiểm tra quest "Mời 1 bạn"
}
function checkQuestProgress_Ref() {
  // Mô phỏng: Chỉ cần mở tab ref => quest daily2
  let quest = playerData.quests.find(q => q.id === "daily2");
  if (quest && !quest.done) {
    quest.done = false; // Tương tự, user phải bấm "Nhận Thưởng"
    savePlayerData();
  }
}

// ========== KHỞI TẠO ==========
showSection("questSection"); // Mặc định vào Quest
updateProfileUI();

</script>
</body>
</html>
