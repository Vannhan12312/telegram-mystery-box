<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COST & FLAME - P2E Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0e0e0e;
      color: #f1f1f1;
      font-size: 14px;
      overflow: auto;
      padding: 10px;
    }

    #intro-screen {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 3000;
      text-align: center;
      color: #fff;
    }

    #intro-screen button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #00cc66;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    #intro-screen button:hover {
      background: #00994d;
    }

    nav {
      display: flex;
      justify-content: space-around;
      margin-bottom: 15px;
    }

    nav button {
      border: none;
      padding: 10px;
      background: #292929;
      color: #f1f1f1;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
      transition: background 0.3s;
    }

    nav button:hover {
      background: #3e3e3e;
    }

    nav .active-tab {
      background: #00cc66;
      color: #fff;
    }

    main {
      display: none;
      padding: 15px;
      background: #1a1a1a;
      border-radius: 10px;
    }

    main.active {
      display: block;
    }

    .marketplace {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .market-item {
      padding: 10px;
      background: #292929;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .market-item button {
      background: #00cc66;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .market-item button:hover {
      background: #00994d;
    }

    .loading-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      font-size: 20px;
    }

  </style>
</head>
<body>
  <div id="intro-screen">
    <h1>Welcome to COST & FLAME</h1>
    <p>The Ultimate P2E Game on TON Blockchain</p>
    <button onclick="startGame()">Start</button>
  </div>

  <nav>
    <button class="active-tab" onclick="switchTab('home')">Home</button>
    <button onclick="switchTab('shop')">Shop</button>
    <button onclick="switchTab('heroes')">Heroes</button>
    <button onclick="switchTab('quests')">Quests</button>
    <button onclick="switchTab('leaderboard')">Leaderboard</button>
    <button onclick="switchTab('marketplace')">Marketplace</button>
    <button onclick="switchTab('settings')">Settings</button>
  </nav>

  <main id="marketplace">
    <h2>Marketplace</h2>
    <div class="marketplace" id="marketplace-list">
      <!-- Marketplace items will be dynamically loaded here -->
    </div>
  </main>

  <main id="quests">
    <h2>Daily Quests</h2>
    <ul class="quest-list" id="quest-list">
      <!-- Quests will be dynamically loaded here -->
    </ul>
  </main>

  <main id="leaderboard">
    <h2>Leaderboard</h2>
    <ul class="leaderboard" id="leaderboard-list">
      <!-- Leaderboard entries will be dynamically loaded here -->
    </ul>
  </main>

  <main id="heroes">
    <h2>Your Heroes</h2>
    <div class="hero-container" id="hero-list"></div>
    <div class="farm-section" id="farm-section" style="display: none;">
      <h3>Farm TON Tokens</h3>
      <p>Select heroes to start farming TON tokens:</p>
      <button onclick="startFarming()">Start Farming</button>
    </div>
  </main>

  <main id="settings">
    <h2>Settings</h2>
    <button onclick="toggleSound()">Toggle Sound</button>
    <button onclick="changeTheme()">Change Theme</button>
  </main>

  <div class="loading-screen" id="loading-screen">
    Loading, please wait...
  </div>

  <script>
    const player = {
      tokens: 100,
      heroes: [],
      walletConnected: false,
      isFarming: false,
      quests: [
        { id: 1, description: "Buy 1 hero pack", completed: false, reward: 10 },
        { id: 2, description: "Farm 50 TON tokens", completed: false, reward: 15 },
        { id: 3, description: "Win 3 PvP battles", completed: false, reward: 20 }
      ],
      leaderboard: [
        { name: "Player1", score: 150 },
        { name: "Player2", score: 120 },
        { name: "Player3", score: 100 }
      ],
      marketplace: [
        { id: 1, name: "FireCrab", price: 50, rarity: "Rare" },
        { id: 2, name: "WaterShield", price: 70, rarity: "Epic" },
        { id: 3, name: "EarthDragon", price: 100, rarity: "Legendary" }
      ]
    };

    function startGame() {
      document.getElementById("intro-screen").style.display = "none";
    }

    function switchTab(tabId) {
      document.querySelectorAll("main").forEach(tab => tab.classList.remove("active"));
      document.querySelector(`#${tabId}`).classList.add("active");
    }

    function showLoading() {
      const loadingScreen = document.getElementById("loading-screen");
      loadingScreen.style.display = "flex";
      setTimeout(() => {
        loadingScreen.style.display = "none";
      }, 2000);
    }

    function loadQuests() {
      const questList = document.getElementById("quest-list");
      questList.innerHTML = player.quests.map(quest => `
        <li class="quest-item">
          <span>${quest.description}</span>
          <button onclick="completeQuest(${quest.id})">Complete</button>
        </li>
      `).join("");
    }

    function completeQuest(questId) {
      const quest = player.quests.find(q => q.id === questId);
      if (quest && !quest.completed) {
        quest.completed = true;
        player.tokens += quest.reward;
        alert(`Quest completed! You earned ${quest.reward} tokens.`);
        loadQuests();
      }
    }

    function loadLeaderboard() {
      const leaderboardList = document.getElementById("leaderboard-list");
      leaderboardList.innerHTML = player.leaderboard.map(entry => `
        <li>
          <span>${entry.name}</span>
          <span>${entry.score} pts</span>
        </li>
      `).join("");
    }

    function loadMarketplace() {
      const marketplaceList = document.getElementById("marketplace-list");
      marketplaceList.innerHTML = player.marketplace.map(item => `
        <div class="market-item">
          <span>${item.name} (${item.rarity})</span>
          <span>${item.price} Tokens</span>
          <button onclick="buyMarketItem(${item.id})">Buy</button>
        </div>
      `).join("");
    }

    function buyMarketItem(itemId) {
      const item = player.marketplace.find(m => m.id === itemId);
      if (item && player.tokens >= item.price) {
        player.tokens -= item.price;
        alert(`You bought ${item.name} for ${item.price} tokens!`);
        loadMarketplace();
      } else {
        alert("Not enough tokens to buy this item!");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadQuests();
      loadLeaderboard();
      loadMarketplace();
    });
  </script>
</body>
</html>
