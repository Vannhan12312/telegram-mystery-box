<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>R&F Merge MiniApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* RESET */
    * {
      box-sizing: border-box;
      margin: 0; 
      padding: 0;
      font-family: sans-serif;
    }
    html, body {
      width: 100%; 
      height: 100%; 
      background: #000; 
      overflow: hidden;
    }
    /* LOADING SCREEN */
    #loadingScreen {
      position: fixed; 
      top: 0; left: 0; 
      width: 100vw; height: 100vh;
      background: url('https://i.imgur.com/gguz2yw.png') center/cover no-repeat;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: flex-end; 
      z-index: 99999;
    }
    #loadingLogo {
      margin-bottom: 20px;
      width: 120px; 
      height: 120px;
      background: url('https://i.imgur.com/4spxSKK.png') center/contain no-repeat;
    }
    #loadingBarOuter {
      width: 60%; 
      max-width: 300px; 
      height: 10px; 
      background: rgba(0,0,0,0.3);
      margin-bottom: 40px;
      border-radius: 5px; 
      overflow: hidden;
    }
    #loadingBarInner {
      width: 0%; 
      height: 100%; 
      background: #ff8800; 
      transition: width 0.2s;
    }

    /* MAIN APP */
    #app {
      display: none;
      position: relative;
      width: 100vw; 
      height: 100vh;
      background: #f5f5f5;
      overflow: hidden;
    }
    /* TOP NAV (4 nút) */
    #topBar {
      height: 50px; 
      background: #222;
      color: #fff;
      display: flex; 
      align-items: center; 
      justify-content: space-around;
    }
    #topBar .navBtn {
      cursor: pointer; 
      padding: 8px 14px; 
      border-radius: 4px;
      background: #333;
      margin: 0 6px;
      font-weight: bold;
      transition: background 0.2s;
    }
    #topBar .navBtn:hover {
      background: #444;
    }
    #topBar .navBtn.active {
      background: #ff7a00;
    }

    /* CONTENT */
    #contentArea {
      position: absolute; 
      top: 50px; 
      left: 0; 
      width: 100%; 
      height: calc(100% - 50px);
      overflow-y: auto; 
      background: #fff;
    }
    .tabPage {
      display: none; 
      padding: 10px;
    }
    .tabPage.show {
      display: block;
    }

    /* HERO GRID (4 columns, no gap) */
    #heroGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }
    .heroCard {
      border: 1px solid #ddd;
      width: 100%;
      height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
    }
    .heroCard img {
      width: 50px; 
      height: 50px; 
      object-fit: cover; 
      border-radius: 4px;
    }
    .heroName {
      margin: 2px 0; 
      font-weight: bold;
    }
    .heroLv {
      margin-bottom: 2px;
      font-weight: bold;
    }
    .heroStats {
      font-size: 10px; 
      line-height: 1.2;
    }

    /* Rarity colors (bold) */
    .rarity-common { color: #999; font-weight:bold; }
    .rarity-rare { color: #0ff; font-weight:bold; }
    .rarity-epic { color: #c66cc5; font-weight:bold; }
    .rarity-legendary { color: #ffa600; font-weight:bold; }
    .rarity-mythic { color: #f00; font-weight:bold; }

    /* MODAL */
    #heroModalOverlay {
      position: fixed; 
      top: 0; left: 0; 
      width: 100vw; 
      height: 100vh; 
      background: rgba(0,0,0,0.5);
      display: none; 
      justify-content: center; 
      align-items: center;
      z-index: 999999;
    }
    #heroModal {
      background: #fff;
      border-radius: 6px;
      padding: 10px;
      width: 240px;
      text-align: center;
      position: relative;
    }
    #heroModal img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px; 
      margin-bottom: 8px;
    }
    #heroModalClose {
      position: absolute; 
      top: 5px; 
      right: 5px; 
      cursor: pointer; 
      background: #ddd; 
      border: none; 
      border-radius: 4px; 
      padding: 2px 6px;
    }
    /* House style placeholder */
    .houseList {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .houseItem {
      border: 1px solid #ccc;
      padding: 6px;
      display: flex; 
      align-items: center; 
      justify-content: space-between;
    }
    .houseItem button {
      background: #f57c00; 
      color:#fff; 
      border:none; 
      border-radius:4px; 
      padding:4px 8px; 
      cursor:pointer;
    }

    /* WALLET: REF, SETTINGS inside, per request */
    #walletSection {
      display: flex; 
      flex-direction: column; 
      gap: 10px;
    }
    .refBox, .settingsBox {
      border:1px solid #ccc; 
      padding:8px; 
      border-radius:4px;
    }
    .refBox button, .settingsBox button {
      background:#f57c00; 
      color:#fff; 
      border:none; 
      padding:4px 8px; 
      border-radius:4px; 
      margin:4px;
      cursor:pointer;
    }

  </style>
</head>

const chances = [
  {rar:"Common",pct:40},

  {rar:"Mythic",pct:5},
];

/* BUY CHEST => random hero => autoMerge => render */
function buyChest(qty){
  let cost=qty*10;
  if(token<cost){ alert("Not enough tokens"); return; }
  token-=cost;
  document.getElementById('tokenDisplay').innerText="🪙 "+token;
  for(let i=0;i<qty;i++){
    let h = randomHero();
    heroList.push({...h,lv:1});
    autoMergeHeroes();
  }
  renderHeroes();
}
/* randomHero by chance */
function randomHero(){
  let roll=Math.random()*100; let sum=0;
  for(let c of chances){
    sum+=c.pct;
    if(roll<sum){
      let arr=heroPool[c.rar];
      let i=Math.floor(Math.random()*arr.length);
      return JSON.parse(JSON.stringify(arr[i]));
    }
  }
  // fallback
  return JSON.parse(JSON.stringify(heroPool.Common[0]));
}
/* autoMerge if 2 hero same name+lv => lv+1 & stats*1.5 => remove dup */
function autoMergeHeroes(){
  let map={};
  heroList.forEach((h,i)=>{
    let k=h.name+"|"+(h.lv||1);
    if(!map[k]) map[k]=[];
    map[k].push(i);
  });
  for(let k in map){
    let arr=map[k];
    while(arr.length>=2){
      let i1=arr.pop(); 
      let i2=arr.pop();
      let h1=heroList[i1];
      h1.lv=(h1.lv||1)+1;
      h1.dmg=Math.floor(h1.dmg*1.5);
      h1.spd=Math.floor(h1.spd*1.5);
      h1.hp=Math.floor(h1.hp*1.5);
      h1.mp=Math.floor(h1.mp*1.5);
      // remove i2
      heroList.splice(i2,1);
      // adjust indexes
      arr=arr.map(x=> x>i2? x-1:x);
    }
  }
}

/* render 4-col no gap, hero stats in bold + colored */
function renderHeroes(){
  let g=document.getElementById('heroGrid');
  g.innerHTML="";
  heroList.forEach((h,idx)=>{
    let card=document.createElement('div');
    card.classList.add('heroCard');
    // rarity class
    let rc="rarity-common";
    if(h.rarity==="Rare") rc="rarity-rare";
    if(h.rarity==="Epic") rc="rarity-epic";
    if(h.rarity==="Legendary") rc="rarity-legendary";
    if(h.rarity==="Mythic") rc="rarity-mythic";
    card.innerHTML=`
      <img src="${h.img}" alt="${h.name}">
      <div class="heroName ${rc}"><b>${h.name}</b></div>
      <div class="heroLv ${rc}">Lv${h.lv} [${h.rarity}]</div>
      <div class="heroStats">
        <b>⚔${h.dmg}</b> <b>✨${h.spd}</b> <b>♥${h.hp}</b> <b>🔮${h.mp}</b><br>
        <b>${h.element||""}</b>
      </div>
    `;
    card.onclick=()=>openHeroModal(idx);
    g.appendChild(card);
  });
}

/* openHeroModal */
function openHeroModal(i){
  let h=heroList[i];
  document.getElementById('heroModalOverlay').style.display='flex';
  document.getElementById('heroModalImg').src=h.img;
  let rc="rarity-common";
  if(h.rarity==="Rare") rc="rarity-rare";
  if(h.rarity==="Epic") rc="rarity-epic";
  if(h.rarity==="Legendary") rc="rarity-legendary";
  if(h.rarity==="Mythic") rc="rarity-mythic";
  document.getElementById('heroModalName').innerHTML=`
    <span class="${rc}"><b>${h.name}</b></span>
  `;
  document.getElementById('heroModalLv').innerHTML=`
    <span class="${rc}"><b>Lv${h.lv} [${h.rarity}]</b></span>
  `;
  document.getElementById('heroModalStats').innerHTML=`
    <b>⚔${h.dmg}</b> <b>✨${h.spd}</b> <b>♥${h.hp}</b> <b>🔮${h.mp}</b>
  `;
  document.getElementById('heroModalElement').innerHTML=`
    <b>${h.element||""}</b>
  `;
}
function closeHeroModal(){
  document.getElementById('heroModalOverlay').style.display='none';
}

function copyRef(){
  let text=document.getElementById('refLink').innerText;
  navigator.clipboard.writeText(text).then(()=>{ alert("Copied link!"); });
}
function shareRef(){
  let text=document.getElementById('refLink').innerText;
  if(navigator.share){
    navigator.share({title:"R&F Game",text:"Join me!",url:text});
  } else {
    alert("Browser not supported to share. Link copied!");
    navigator.clipboard.writeText(text);
  }
}
function withdrawRef(){
  alert("Ref reward withdrawn (demo).");
}

function toggleSound(){
