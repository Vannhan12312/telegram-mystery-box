<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rost & Flame</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #a9d6e5, #457b9d);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            color: #f4f4f4;
        }
        .header img {
            width: 150px;
            height: auto;
            margin-top: 10px;
        }
        .stats {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .stats p {
            margin: 8px 0;
            font-size: 16px;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .button {
            padding: 10px 15px;
            background: #457b9d;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .button:hover {
            background: #1d3557;
        }
        .button.vip {
            background: #e63946;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Rost & Flame</h1>
            <img src="https://example.com/ice-phoenix.png" alt="Ice Phoenix">
            <p id="userInfo">Welcome, Ice Phoenix Keeper</p>
        </div>

        <!-- Stats Section -->
        <div class="stats">
            <p><strong>💰 Balance:</strong> <span id="tonBalance">100 TON</span></p>
            <p><strong>🔥 Ice Phoenixes Trained Today:</strong> <span id="trainCount">0/10</span></p>
            <p><strong>⭐ VIP Phoenixes Served Today:</strong> <span id="vipCount">0/2</span></p>
        </div>

        <!-- Actions Section -->
        <div class="actions">
            <button class="button" onclick="trainPhoenix()">❄️ Train Phoenix (0.5 TON)</button>
            <button class="button vip" onclick="serveVipPhoenix()">🌟 Serve VIP Phoenix (5 TON)</button>
            <button class="button" onclick="openWithdrawForm()">💸 Withdraw Toncoin</button>
        </div>
    </div>

    <!-- Withdraw Form -->
    <div class="container" id="withdrawContainer" style="display: none;">
        <h2>Withdraw Toncoin</h2>
        <form id="withdrawForm" onsubmit="handleWithdraw(event)">
            <div>
                <label for="walletAddress">Wallet Address:</label>
                <input type="text" id="walletAddress" placeholder="Enter your TON wallet address" required>
            </div>
            <div>
                <label for="amount">Amount to Withdraw:</label>
                <input type="number" id="amount" placeholder="Enter amount" required>
            </div>
            <button class="button" type="submit">Confirm Withdraw</button>
            <button class="button" type="button" onclick="closeWithdrawForm()">Cancel</button>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let user = {
            tonBalance: 100,
            trainCount: 0,
            vipCount: 0,
        };

        function loadTelegramUserInfo() {
            const userInfo = tg.initDataUnsafe.user;
            const displayName = userInfo ? `${userInfo.first_name} ${userInfo.last_name || ''}` : "Ice Phoenix Keeper";
            document.getElementById("userInfo").textContent = `Welcome, ${displayName}`;
        }

        function trainPhoenix() {
            if (user.trainCount < 10) {
                user.trainCount++;
                user.tonBalance += 0.5;
                alert("Ice Phoenix trained successfully! You earned 0.5 TON.");
                updateStats();
            } else {
                alert("You have reached the daily training limit (10).");
            }
        }

        function serveVipPhoenix() {
            if (user.vipCount < 2) {
                if (Math.random() > 0.7) {
                    user.vipCount++;
                    user.tonBalance += 5;
                    alert("VIP Ice Phoenix served! You earned 5 TON.");
                } else {
                    alert("No VIP Phoenixes available right now.");
                }
                updateStats();
            } else {
                alert("You have reached the daily VIP serving limit (2).");
            }
        }

        function openWithdrawForm() {
            document.getElementById("withdrawContainer").style.display = "block";
        }

        function closeWithdrawForm() {
            document.getElementById("withdrawContainer").style.display = "none";
        }

        function handleWithdraw(event) {
            event.preventDefault();
            const walletAddress = document.getElementById("walletAddress").value;
            const amount = parseFloat(document.getElementById("amount").value);
            if (amount > user.tonBalance) {
                alert("Insufficient balance.");
                return;
            }
            if (amount <= 0) {
                alert("Invalid amount.");
                return;
            }
            const confirmWithdraw = confirm(`Withdraw ${amount} TON to ${walletAddress}?`);
            if (confirmWithdraw) {
                user.tonBalance -= amount;
                alert(`Successfully withdrawn ${amount} TON to ${walletAddress}.`);
                closeWithdrawForm();
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById("tonBalance").textContent = `${user.tonBalance.toFixed(1)} TON`;
            document.getElementById("trainCount").textContent = `${user.trainCount}/10`;
            document.getElementById("vipCount").textContent = `${user.vipCount}/2`;
        }

        loadTelegramUserInfo();
    </script>
</body>
</html>
