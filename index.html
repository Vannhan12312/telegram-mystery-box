<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dragon Egg Presale (Mini App)</title>
  <style>
    /* ================================
       RESET & GLOBAL BOLD
    =================================*/
    * {
      margin: 0; 
      padding: 0;
      box-sizing: border-box;
      font-family: "Arial", sans-serif;
      font-weight: bold;
    }
    body {
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ================================
       HEADER (có thể ẩn nếu muốn)
    =================================*/
    header {
      text-align: center;
      padding: 0.5rem;
      background: #1e1e1e;
    }
    header h1 {
      font-size: 1.2rem;
    }

    /* ================================
       MAIN CONTAINER
    =================================*/
    main {
      flex: 1;
      padding: 1rem;
      position: relative;
      z-index: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    /* ================================
       BOTTOM NAV
    =================================*/
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: #1e1e1e;
      padding: 0.5rem 0;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .nav-btn.active {
      color: #00c6ff;
    }
    .nav-btn img {
      width: 24px; 
      height: 24px; 
      margin-bottom: 0.2rem;
    }

    /* ================================
       TAB CONTENT
    =================================*/
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* ================================
       CARD & BUTTON
    =================================*/
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      border: none;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
      font-size: 0.8rem;
    }
    .btn:hover {
      background: linear-gradient(45deg, #0072ff, #00c6ff);
    }
    label {
      font-size: 0.8rem;
    }
    input[type="number"] {
      width: 60px;
      font-size: 0.8rem;
      text-align: center;
    }

    /* ================================
       HERO GRID (3 COLUMNS)
    =================================*/
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.7rem;
    }
    .hero-card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 0.5rem;
      text-align: center;
      font-size: 0.7rem;
      position: relative;
    }
    .hero-card img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #00c6ff;
      margin-bottom: 0.3rem;
    }
    .hero-card:hover {
      transform: scale(1.03);
    }

    /* Màu chữ theo rarity */
    .rarity-common { color: #ffffff; }
    .rarity-uncommon { color: #00ff00; }
    .rarity-rare { color: #0066ff; }
    .rarity-epic { color: #ffff00; }
    .rarity-legendary { color: #ff0000; }

    /* ================================
       MODAL (để hiển thị hero vừa mở)
    =================================*/
    .modal-bg {
      display: none;
      position: fixed; 
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .modal-bg.active {
      display: flex;
    }
    .modal-card {
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 1rem;
      max-width: 300px;
      text-align: center;
    }
    .modal-card img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #00c6ff;
      margin-bottom: 0.3rem;
    }
    .modal-buttons {
      margin-top: 0.5rem;
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
    }

    /* ================================
       FOOTER
    =================================*/
    footer {
      text-align: center;
      background: #1e1e1e;
      padding: 0.5rem;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <!-- HEADER (có thể ẩn nếu muốn) -->
  <header>
    <h1>Dragon Egg Presale</h1>
  </header>

  <main>
    <!-- TAB: CONNECT -->
    <section id="tabConnect" class="tab-content active">
      <div class="card">
        <p>Connect TON Wallet (Demo)</p>
        <button class="btn" onclick="connectWallet()">Connect</button>
      </div>
    </section>

    <!-- TAB: PRESALE -->
    <section id="tabPresale" class="tab-content">
      <div class="card">
        <p>Presale (3000 Eggs)</p>
        <!-- Trạng thái (demo) -->
        <p id="eggsLeftInfo">Eggs Left: 3000</p>
        <div style="margin-top:0.5rem;">
          <label for="qty">Quantity:</label>
          <input type="number" id="qty" value="1" min="1">
          <button class="btn" onclick="buyEggs()">Buy</button>
        </div>
      </div>
    </section>

    <!-- TAB: HERO -->
    <section id="tabHero" class="tab-content">
      <div class="card">
        <p>Your Heroes</p>
        <div class="hero-grid" id="heroGrid">
          <!-- Hero hiển thị 3 cột; hero chưa mua thì ko hiện -->
        </div>
      </div>
    </section>

    <!-- TAB: REFERRAL -->
    <section id="tabReferral" class="tab-content">
      <div class="card">
        <p>Share Your Link</p>
        <input type="text" id="refLink" style="width:100%; margin-bottom:0.5rem;" 
               value="https://t.me/DragonEggBot?start=ReferralID" readonly />
        <button class="btn" onclick="copyRefLink()">Copy</button>
      </div>
      <div class="card">
        <p>Referral Reward: <span id="refReward">0</span> TON</p>
        <button class="btn" onclick="claimRef()">Claim</button>
      </div>
    </section>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-btn active" id="navConnect" onclick="switchTab('tabConnect', this)">
      <!-- Thay icon thật nếu muốn -->
      <img src="https://via.placeholder.com/24/FFFFFF?text=C" alt="Connect Icon"/>
      <span>Connect</span>
    </div>
    <div class="nav-btn" id="navPresale" onclick="switchTab('tabPresale', this)">
      <img src="https://via.placeholder.com/24/FFFFFF?text=P" alt="Presale Icon"/>
      <span>Presale</span>
    </div>
    <div class="nav-btn" id="navHero" onclick="switchTab('tabHero', this)">
      <img src="https://via.placeholder.com/24/FFFFFF?text=H" alt="Hero Icon"/>
      <span>Hero</span>
    </div>
    <div class="nav-btn" id="navReferral" onclick="switchTab('tabReferral', this)">
      <img src="https://via.placeholder.com/24/FFFFFF?text=R" alt="Referral Icon"/>
      <span>Referral</span>
    </div>
  </nav>

  <!-- FOOTER (có thể ẩn nếu muốn) -->
  <footer>
    <p>© 2025 - Dragon Egg Presale (Mini App)</p>
  </footer>

  <!-- MODAL ĐỂ HIỂN THỊ HERO MỚI MỞ -->
  <div class="modal-bg" id="modalBg">
    <div class="modal-card" id="modalCard">
      <!-- Sẽ hiện thông tin hero -->
      <img src="https://via.placeholder.com/60?text=Hero" alt="Hero"/>
      <div id="modalHeroInfo" style="margin-top:0.5rem;"></div>
      <div class="modal-buttons">
        <button class="btn" onclick="nextHero()">Next</button>
      </div>
    </div>
  </div>

  <script>
    /* =====================================
       BIẾN DEMO
    ====================================== */
    let eggsLeft = 3000;
    let userReferralTon = 0;

    // Danh sách Hero
    let userHeroes = []; 
    // Lưu danh sách hero mới mở (nếu user mua nhiều)
    let openedHeroesQueue = [];
    let heroIdCount = 0;

    /* =====================================
       TAB SWITCH
    ====================================== */
    function switchTab(tabId, navBtnElem) {
      // 1) Ẩn tất cả .tab-content
      const tabs = document.getElementsByClassName("tab-content");
      for (let i=0; i<tabs.length; i++){
        tabs[i].classList.remove("active");
      }
      // 2) Bỏ active ở các .nav-btn
      const navBtns = document.getElementsByClassName("nav-btn");
      for (let i=0; i<navBtns.length; i++){
        navBtns[i].classList.remove("active");
      }
      // 3) Hiện tab được chọn, set active cho nav
      document.getElementById(tabId).classList.add("active");
      navBtnElem.classList.add("active");
    }

    /* =====================================
       CONNECT WALLET (DEMO)
    ====================================== */
    function connectWallet(){
      alert("Connect TON Wallet - Demo!");
    }

    /* =====================================
       MUA TRỨNG => MỞ TỪNG HERO
    ====================================== */
    function buyEggs(){
      let qty = parseInt(document.getElementById("qty").value) || 1;
      if (qty < 1) qty = 1;
      if (eggsLeft <= 0){
        alert("No eggs left!");
        return;
      }
      if (qty > eggsLeft){
        alert(`Only ${eggsLeft} eggs left!`);
        return;
      }
      // Giảm số trứng
      eggsLeft -= qty;
      document.getElementById("eggsLeftInfo").textContent = "Eggs Left: " + eggsLeft;

      // Tạo hero mới & cho vào openedHeroesQueue
      for (let i=0; i<qty; i++){
        const newHero = createRandomHero();
        openedHeroesQueue.push(newHero);
      }
      alert(`You bought ${qty} egg(s)! Let's see what you got...`);
      showNextOpenedHero();
    }

    // Tạo hero random
    function createRandomHero(){
      const rarities = ["Common","Uncommon","Rare","Epic","Legendary"];
      // Tỷ lệ (demo)
      let n = Math.random()*100;
      let r = "";
      if (n<40) r="Common";
      else if (n<70) r="Uncommon";
      else if (n<90) r="Rare";
      else if (n<98) r="Epic";
      else r="Legendary";

      heroIdCount++;
      let stats = {
        "🗡": Math.floor(Math.random()*50)+50,
        "🛡": Math.floor(Math.random()*50)+50,
        "❤️": Math.floor(Math.random()*200)+200,
        "⚡": Math.floor(Math.random()*30)+10,
        "✨": Math.floor(Math.random()*40)+20
      };
      return {
        heroId: heroIdCount,
        rarity: r,
        level: 1,
        stats: stats
      };
    }

    /* 
      Hiển thị hero tiếp theo trong hàng đợi openedHeroesQueue
      dưới dạng modal
    */
    function showNextOpenedHero(){
      if (openedHeroesQueue.length === 0) {
        // Không còn hero cần show => cập nhật hero list
        renderHeroList();
        return;
      }
      // Lấy hero kế
      const hero = openedHeroesQueue[0];
      // Hiển thị modal
      document.getElementById("modalBg").classList.add("active");
      renderModalHero(hero);
    }

    function renderModalHero(hero){
      const colorClass = getRarityClass(hero.rarity);
      // Stats
      let statsStr = "";
      for (let k in hero.stats){
        statsStr += `${k}${hero.stats[k]}  `;
      }
      const infoDiv = document.getElementById("modalHeroInfo");
      infoDiv.innerHTML = `
        <div class="${colorClass}" style="font-size:0.8rem;">
          Hero #${hero.heroId}
        </div>
        <div class="${colorClass}" style="font-size:0.7rem;">
          Rarity: ${hero.rarity}, Lvl: ${hero.level}
        </div>
        <div style="margin-top:0.3rem; font-size:0.7rem;">
          ${statsStr}
        </div>
      `;
    }

    function nextHero(){
      // Đóng modal hero đầu tiên => add hero vào userHeroes => autoUpgrade => Show hero tiếp
      const hero = openedHeroesQueue.shift();
      userHeroes.push(hero);
      autoUpgradeHero(hero.rarity);
      // Ẩn modal
      document.getElementById("modalBg").classList.remove("active");

      // Nếu còn hero trong queue => hiển thị hero tiếp
      if (openedHeroesQueue.length > 0){
        showNextOpenedHero();
      } else {
        // Hết => render
        renderHeroList();
      }
    }

    /* =====================================
       AUTO UPGRADE (2 hero cùng rarity & level)
    ====================================== */
    function autoUpgradeHero(rarity){
      // Lấy tất cả hero cùng rarity
      const same = userHeroes.filter(h => h.rarity === rarity);
      if (same.length < 2) return; 

      // Sắp xếp theo level
      same.sort((a,b)=> a.level - b.level);

      // Kiểm tra cặp đầu
      let h1 = same[0];
      let h2 = same[1];
      if (h1.level === h2.level){
        // Merge => level up h1
        h1.level += 1;
        // +70% stats
        for (let key in h1.stats){
          h1.stats[key] = Math.floor(h1.stats[key]*1.7);
        }
        // Xoá h2
        userHeroes = userHeroes.filter(x => x.heroId !== h2.heroId);

        // Lặp lại (có thể merge tiếp)
        autoUpgradeHero(rarity);
      }
    }

    /* =====================================
       RENDER HERO LIST
    ====================================== */
    function renderHeroList(){
      const grid = document.getElementById("heroGrid");
      grid.innerHTML = "";

      // Sort hero => Common->Uncommon->Rare->Epic->Legendary
      const order = ["Common","Uncommon","Rare","Epic","Legendary"];
      let sorted = [...userHeroes].sort((a,b)=>{
        return order.indexOf(a.rarity) - order.indexOf(b.rarity);
      });

      sorted.forEach(hero => {
        const d = document.createElement("div");
        d.className = "hero-card";
        const colorClass = getRarityClass(hero.rarity);

        // Stats
        let statsStr = "";
        for (let k in hero.stats){
          statsStr += `${k}${hero.stats[k]} `;
        }

        d.innerHTML = `
          <img src="https://via.placeholder.com/50?text=Hero"/>
          <div class="${colorClass}" style="font-size:0.8rem;">
            Hero #${hero.heroId}
          </div>
          <div class="${colorClass}" style="font-size:0.7rem;">
            ${hero.rarity}, Lvl: ${hero.level}
          </div>
          <div style="font-size:0.7rem; margin-top:0.3rem;">
            ${statsStr}
          </div>
        `;
        grid.appendChild(d);
      });
    }

    /* =====================================
       GET RARITY CLASS => ĐỔI MÀU CHỮ
    ====================================== */
    function getRarityClass(r){
      switch(r){
        case "Common": return "rarity-common";
        case "Uncommon": return "rarity-uncommon";
        case "Rare": return "rarity-rare";
        case "Epic": return "rarity-epic";
        case "Legendary": return "rarity-legendary";
        default: return "rarity-common";
      }
    }

    /* =====================================
       REFERRAL FUNCTIONS (DEMO)
    ====================================== */
    function copyRefLink(){
      const ref = document.getElementById("refLink");
      ref.select();
      ref.setSelectionRange(0,99999);
      document.execCommand("copy");
      alert("Link copied!");
    }

    function claimRef(){
      if (userReferralTon>0){
        alert(`You claimed ${userReferralTon} TON!`);
        userReferralTon=0;
        document.getElementById("refReward").textContent=0;
      } else {
        alert("No referral reward yet!");
      }
    }
  </script>
</body>
</html>
