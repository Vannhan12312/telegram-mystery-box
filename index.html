<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COST & FLAME - P2E Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0e0e0e;
      color: #f1f1f1;
      font-size: 14px;
      overflow: hidden;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-around;
      background: #292929;
      padding: 5px 0;
      overflow-x: auto;
    }

    nav button {
      border: none;
      padding: 5px;
      background: #1a1a1a;
      color: #f1f1f1;
      cursor: pointer;
      border-radius: 5px;
      font-size: 12px;
      font-weight: bold;
      transition: background 0.3s;
    }

    nav button:hover {
      background: #3e3e3e;
    }

    nav .active-tab {
      background: #00cc66;
      color: #fff;
    }

    main {
      display: none;
      flex-grow: 1;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 10px;
      overflow-y: auto;
    }

    main.active {
      display: block;
    }

    .hero-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .hero-card {
      background: #292929;
      border: 1px solid #444;
      border-radius: 5px;
      text-align: center;
      padding: 10px;
      transition: transform 0.3s;
      cursor: pointer;
    }

    .hero-card:hover {
      transform: translateY(-5px);
    }

    .hero-card img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .hero-card p {
      margin: 0;
      font-size: 12px;
      color: #fff;
    }

    .wallet {
      text-align: center;
      padding: 10px;
      background: #292929;
      border-radius: 5px;
      margin-top: 10px;
    }

    .wallet img {
      width: 20px;
      vertical-align: middle;
    }

    .farm-section {
      text-align: center;
      padding: 10px;
      background: #292929;
      border-radius: 5px;
      margin-top: 10px;
    }

    .farm-section button {
      padding: 10px;
      background: #00cc66;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    .farm-section button:hover {
      background: #00994d;
    }
  </style>
</head>
<body>
  <nav>
    <button class="active-tab" onclick="switchTab('home')">Home</button>
    <button onclick="switchTab('shop')">Shop</button>
    <button onclick="switchTab('heroes')">Heroes</button>
    <button onclick="switchTab('wallet')">Wallet</button>
    <button onclick="switchTab('more')">More</button>
  </nav>

  <main id="home" class="active">
    <h2>Welcome to COST & FLAME</h2>
  </main>

  <main id="shop">
    <h2>Shop</h2>
    <p>Buy hero packs to grow your collection.</p>
    <button onclick="buyChest(1)">Buy 1 Pack</button>
    <button onclick="buyChest(5)">Buy 5 Packs</button>
  </main>

  <main id="heroes">
    <h2>Your Heroes</h2>
    <div class="hero-container" id="hero-list"></div>
  </main>

  <main id="wallet">
    <h2>Wallet</h2>
    <div class="wallet">
      <p><img src="https://cryptologos.cc/logos/ton-crystal-ton-logo.png" alt="TON" /> Tokens: <span id="wallet-tokens">100</span></p>
      <button onclick="withdrawTokens()">Withdraw Tokens</button>
    </div>
    <div class="farm-section">
      <h3>Farm TON</h3>
      <p>Earn tokens by farming with your heroes.</p>
      <button onclick="startFarming()">Start Farming</button>
    </div>
  </main>

  <main id="more">
    <h2>More Options</h2>
    <button onclick="switchTab('quests')">Quests</button>
    <button onclick="switchTab('leaderboard')">Leaderboard</button>
    <button onclick="switchTab('marketplace')">Marketplace</button>
    <button onclick="switchTab('pvp')">PvP</button>
  </main>

  <script>
    const player = {
      tokens: 100,
      heroes: [],
    };

    const allHeroData = [
      { name: "SlimeKid", rarity: "Common", img: "https://i.imgur.com/wY0nzE9.png", level: 1 },
      { name: "FireCrab", rarity: "Rare", img: "https://i.imgur.com/3l9MKIl.png", level: 1 },
      { name: "WaterShield", rarity: "Epic", img: "https://i.imgur.com/H65ycJW.png", level: 1 }
    ];

    function switchTab(tabId) {
      document.querySelectorAll("main").forEach(tab => tab.classList.remove("active"));
      document.querySelector(`#${tabId}`).classList.add("active");
    }

    function buyChest(count) {
      const cost = 10 * count;
      if (player.tokens < cost) {
        alert("Not enough tokens!");
        return;
      }
      player.tokens -= cost;
      for (let i = 0; i < count; i++) {
        const newHero = { ...allHeroData[Math.floor(Math.random() * allHeroData.length)] };
        mergeHero(newHero);
      }
      updateHeroList();
      updateWallet();
    }

    function mergeHero(newHero) {
      const existingHero = player.heroes.find(hero => hero.name === newHero.name && hero.level === newHero.level);
      if (existingHero) {
        existingHero.level += 1;
      } else {
        player.heroes.push(newHero);
      }
    }

    function updateHeroList() {
      const heroList = document.getElementById("hero-list");
      if (player.heroes.length === 0) {
        heroList.innerHTML = "<p>No heroes yet. Buy packs to get heroes!</p>";
        return;
      }
      heroList.innerHTML = player.heroes.map(hero => `
        <div class="hero-card" onclick="showHeroDetails('${hero.name}')">
          <img src="${hero.img}" alt="${hero.name}">
          <p>${hero.name}</p>
          <p>Lv${hero.level}</p>
        </div>
      `).join("");
    }

    function updateWallet() {
      document.getElementById("wallet-tokens").textContent = player.tokens;
    }

    function withdrawTokens() {
      alert("Withdraw feature coming soon!");
    }

    function startFarming() {
      alert("Farming started! Feature under development.");
    }

    document.addEventListener("DOMContentLoaded", () => {
      updateHeroList();
      updateWallet();
    });
  </script>
</body>
</html>
