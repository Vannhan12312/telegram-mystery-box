<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rost & Flame - Telegram Mini Game</title>
  <style>
    * {
      box-sizing: border-box; 
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    body {
      background: #fafafa;
      font-size: 14px;
    }
    header {
      background: #f55742; 
      color: #fff;
      text-align: center;
      padding: 10px;
    }
    nav {
      display: flex;
      justify-content: space-around;
      background: #efefef;
      padding: 10px 0;
    }
    nav button {
      border: none;
      background: #fff;
      padding: 10px;
      cursor: pointer;
      flex: 1;
      font-weight: bold;
    }
    nav .active-tab {
      background: #c3f0d1;
    }
    main {
      padding: 10px;
      display: none;
    }
    main.active {
      display: block;
    }
    .hero-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .hero-card {
      text-align: center;
      border: 1px solid #ddd;
      padding: 5px;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      overflow: hidden;
    }
    .hero-card img {
      max-width: 50px;
      margin: 5px auto;
    }
    .hero-card p {
      margin: 5px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    footer {
      text-align: center;
      padding: 10px;
      background: #f4f4f4;
    }
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      position: relative;
    }
    #modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px;
      background: #ddd;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    .color-common {
      color: #AAAAAA;
    }
    .color-rare {
      color: #54FFFE;
    }
    .color-epic {
      color: #C66CC5;
    }
    .color-legendary {
      color: #FFA800;
    }
    .color-mythic {
      color: #FF0000;
    }
  </style>
</head>
<body>
  <header>
    <h1>Rost & Flame</h1>
    <p>The Ultimate Telegram Mini Game</p>
  </header>

  <nav>
    <button class="active-tab" onclick="switchTab('home')">Home</button>
    <button onclick="switchTab('shop')">Shop</button>
    <button onclick="switchTab('hero')">Hero</button>
    <button onclick="switchTab('quest')">Quest</button>
    <button onclick="switchTab('wallet')">Wallet</button>
  </nav>

  <main id="home" class="active">
    <p>Welcome to Rost & Flame. Explore and build your hero collection!</p>
    <div id="player-summary"></div>
  </main>

  <main id="shop">
    <h2>Shop</h2>
    <p>Buy chests to expand your hero collection.</p>
    <button onclick="buyChest(10)">Buy 10 Chests</button>
    <p id="shop-message"></p>
  </main>

  <main id="hero">
    <h2>Hero</h2>
    <div class="hero-container" id="hero-list"></div>
  </main>

  <main id="quest">
    <h2>Quests</h2>
    <div id="quest-list"></div>
  </main>

  <main id="wallet">
    <h2>Wallet</h2>
    <p>Manage your tokens and perform swaps.</p>
    <p>RFM Tokens: <span id="wallet-tokens">100</span></p>
  </main>

  <div id="modal-overlay">
    <div id="modal-content">
      <button id="modal-close" onclick="closeModal()">X</button>
      <h3>Hero Details</h3>
      <img id="modal-hero-img" src="" alt="Hero" style="max-width: 100px; margin: 10px 0;" />
      <p id="modal-hero-name" style="font-weight: bold;"></p>
      <p id="modal-hero-damage"></p>
      <p id="modal-hero-skill"></p>
      <p id="modal-hero-earn"></p>
      <p id="modal-hero-level"></p>
    </div>
  </div>

  <footer>
    &copy; 2023 Rost & Flame
  </footer>

  <script>
    const player = {
      tokens: 100,
      heroes: [
        { name: 'Hero 1', rarity: 'Common', img: 'https://i.imgur.com/wY0nzE9.png', attribute: 'Water', symbol: '💧', earnRate: 5, level: 1 },
        { name: 'Hero 2', rarity: 'Rare', img: 'https://i.imgur.com/Iy1X8r1.png', attribute: 'Fire', symbol: '🔥', earnRate: 6, level: 1 },
        { name: 'Hero 3', rarity: 'Epic', img: 'https://i.imgur.com/81Ypu1S.png', attribute: 'Earth', symbol: '🌎', earnRate: 7, level: 1 },
        { name: 'Hero 4', rarity: 'Legendary', img: 'https://i.imgur.com/XMUx21e.png', attribute: 'Wind', symbol: '🍃', earnRate: 8, level: 1 },
        { name: 'Hero 5', rarity: 'Mythic', img: 'https://i.imgur.com/eVNSFSH.png', attribute: 'Electric', symbol: '⚡', earnRate: 9, level: 1 },
        { name: 'Hero 6', rarity: 'Common', img: 'https://i.imgur.com/3l9MKIl.png', attribute: 'Water', symbol: '💧', earnRate: 5, level: 1 },
        { name: 'Hero 7', rarity: 'Rare', img: 'https://i.imgur.com/cSy6okk.png', attribute: 'Fire', symbol: '🔥', earnRate: 6, level: 1 },
        { name: 'Hero 8', rarity: 'Epic', img: 'https://i.imgur.com/QRJyOyp.png', attribute: 'Earth', symbol: '🌎', earnRate: 7, level: 1 },
        { name: 'Hero 9', rarity: 'Legendary', img: 'https://i.imgur.com/NK8EQm1.png', attribute: 'Wind', symbol: '🍃', earnRate: 8, level: 1 },
        { name: 'Hero 10', rarity: 'Mythic', img: 'https://i.imgur.com/Aa396uh.png', attribute: 'Electric', symbol: '⚡', earnRate: 9, level: 1 },
        { name: 'Hero 11', rarity: 'Common', img: 'https://i.imgur.com/02jTwGp.png', attribute: 'Water', symbol: '💧', earnRate: 5, level: 1 },
        { name: 'Hero 12', rarity: 'Rare', img: 'https://i.imgur.com/JOCwUzy.png', attribute: 'Fire', symbol: '🔥', earnRate: 6, level: 1 },
        { name: 'Hero 13', rarity: 'Epic', img: 'https://i.imgur.com/wr71ePx.png', attribute: 'Earth', symbol: '🌎', earnRate: 7, level: 1 },
        { name: 'Hero 14', rarity: 'Legendary', img: 'https://i.imgur.com/OXjxfTK.png', attribute: 'Wind', symbol: '🍃', earnRate: 8, level: 1 },
        { name: 'Hero 15', rarity: 'Mythic', img: 'https://i.imgur.com/PqCgXay.png', attribute: 'Electric', symbol: '⚡', earnRate: 9, level: 1 },
        { name: 'Hero 16', rarity: 'Common', img: 'https://i.imgur.com/23DhlYC.png', attribute: 'Water', symbol: '💧', earnRate: 5, level: 1 },
        { name: 'Hero 17', rarity: 'Rare', img: 'https://i.imgur.com/Rhu6apu.png', attribute: 'Fire', symbol: '🔥', earnRate: 6, level: 1 },
        { name: 'Hero 18', rarity: 'Epic', img: 'https://i.imgur.com/OCaOjCv.png', attribute: 'Earth', symbol: '🌎', earnRate: 7, level: 1 },
        { name: 'Hero 19', rarity: 'Legendary', img: 'https://i.imgur.com/SXQMxBI.png', attribute: 'Wind', symbol: '🍃', earnRate: 8, level: 1 },
        { name: 'Hero 20', rarity: 'Mythic', img: 'https://i.imgur.com/5HE6crv.png', attribute: 'Electric', symbol: '⚡', earnRate: 9, level: 1 },
        { name: 'Hero 21', rarity: 'Common', img: 'https://i.imgur.com/tFzK3iu.png', attribute: 'Water', symbol: '💧', earnRate: 5, level: 1 },
        { name: 'Hero 22', rarity: 'Rare', img: 'https://i.imgur.com/ujlhSVK.png', attribute: 'Fire', symbol: '🔥', earnRate: 6, level: 1 },
        { name: 'Hero 23', rarity: 'Epic', img: 'https://i.imgur.com/1K8xEcc.png', attribute: 'Earth', symbol: '🌎', earnRate: 7, level: 1 },
        { name: 'Hero 24', rarity: 'Legendary', img: 'https://i.imgur.com/EokU1JU.png', attribute: 'Wind', symbol: '🍃', earnRate: 8, level: 1 },
        { name: 'Hero 25', rarity: 'Mythic', img: 'https://i.imgur.com/Qg9MLyO.png', attribute: 'Electric', symbol: '⚡', earnRate: 9, level: 1 }
      ],
      quests: [
        { id: 1, name: "Complete Tutorial", completed: false, reward: 10 },
      ]
    };

    function switchTab(tabId) {
      document.querySelectorAll('main').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active-tab');
      if (tabId === 'home') updateHome();
      if (tabId === 'hero') updateHero();
    }

    function updateHome() {
      document.getElementById('player-summary').textContent = `Tokens: ${player.tokens}, Heroes: ${player.heroes.length}`;
    }

    function updateHero() {
      const container = document.getElementById('hero-list');
      container.innerHTML = player.heroes.map((hero, index) => `
        <div class="hero-card" onclick="showHeroDetails(${index})">
          <img src="${hero.img}" alt="${hero.name}" />
          <p class="color-${hero.rarity.toLowerCase()}">${hero.name} (${hero.rarity})</p>
          <p>${hero.symbol} ${hero.attribute}</p>
          <p>Lv: ${hero.level}</p>
        </div>`).join('');
    }

    function showHeroDetails(index) {
      const hero = player.heroes[index];
      document.getElementById('modal-hero-img').src = hero.img;
      document.getElementById('modal-hero-name').textContent = `${hero.name} (${hero.symbol} ${hero.attribute})`;
      document.getElementById('modal-hero-damage').textContent = `Damage: ⚔ ${Math.floor(Math.random() * 100) + 50}`;
      document.getElementById('modal-hero-skill').textContent = `Skill: Special Move`;
      document.getElementById('modal-hero-earn').textContent = `Farm Rate: ${hero.earnRate} tokens/day`;
      document.getElementById('modal-hero-level').textContent = `Level: ${hero.level}`;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateHome();
      updateHero();
    });
  </script>
</body>
</html>
