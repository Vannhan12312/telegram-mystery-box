<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dragon Egg Presale - Telegram Mini App (Updated)</title>

  <!-- Telegram WebApp JavaScript -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Roboto", sans-serif;
    }
    body {
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    header, footer {
      text-align: center;
      padding: 1rem;
      background: #1e1e1e;
    }

    footer p {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    main {
      flex: 1;
      padding: 1rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .tab-btn.active {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
    }

    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    .hero-list-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .hero-card {
      width: 160px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
      position: relative;
      cursor: pointer;
    }

    .hero-card img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      margin-bottom: 0.5rem;
      border-radius: 50%;
      border: 2px solid #00c6ff;
    }

    .hero-card:hover {
      transform: scale(1.03);
      transition: 0.2s;
    }

    .hero-rarity {
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
    }

    /* Màu tên theo độ hiếm */
    .rarity-common {
      color: #ccc; 
    }
    .rarity-uncommon {
      color: #4CAF50; 
    }
    .rarity-rare {
      color: #2196F3;
    }
    .rarity-epic {
      color: #9C27B0;
    }
    .rarity-legendary {
      color: #FFD700;
    }

    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      border: none;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .btn:hover {
      background: linear-gradient(45deg, #0072ff, #00c6ff);
    }

    .egg-section {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      margin-top: 1rem;
    }

    .egg-image {
      width: 120px;
      height: 120px;
      border: 2px solid #00c6ff;
      border-radius: 50%;
      margin-bottom: 1rem;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      text-align: center;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #1e1e1e;
      margin: 20px;
      padding: 1.5rem;
      border-radius: 8px;
      max-width: 400px;
      width: 90%;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 10px; 
      right: 10px;
      cursor: pointer;
      background: transparent;
      border: none;
      font-size: 1.2rem;
      color: #fff;
      font-weight: bold;
    }
    .modal-content img {
      display: block;
      margin: 0 auto 1rem auto;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #00c6ff;
    }

    /* Wallet */
    .wallet-card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .wallet-item {
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.08);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      align-items: center;
    }

    .wallet-label {
      font-weight: bold;
    }

    .countdown {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .progress-bar {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      height: 10px;
      width: 100%;
      position: relative;
    }

    .progress-fill {
      background: linear-gradient(45deg, #00ff88, #00c6ff);
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.5s;
    }
    
    .presale-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .gift-box {
      font-size: 1.5rem;
      color: gold;
    }
  </style>
</head>
<body>
  <div class="bg-hero"></div>

  <header>
    <h1>Dragon Egg Presale</h1>
    <h2 class="presale-title">
      <span>Presale (3000 Eggs)</span> 
      <span class="gift-box">🎁🎁</span>
    </h2>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-btn active" onclick="openTab(event, 'tabPresale')">Mua Trứng</button>
      <button class="tab-btn" onclick="openTab(event, 'tabHero')">Hero</button>
      <button class="tab-btn" onclick="openTab(event, 'tabWallet')">Wallet</button>
      <button class="tab-btn" onclick="openTab(event, 'tabReferral')">Referral</button>
    </div>

    <!-- Mua Trứng -->
    <section id="tabPresale" class="tab-content active">
      <div class="card">
        <h3>Presale 3000 trứng</h3>
        <div class="countdown">
          Presale còn <span id="countdownTimer">--:--:--</span>
        </div>

        <div class="egg-section">
          <div class="egg-image">
            TRỨNG
          </div>
          <label for="eggQuantity">Số lượng mua:</label>
          <input type="number" id="eggQuantity" min="1" value="1" style="width:60px;margin-left:0.5rem;" />
          <button class="btn" onclick="buyEggs()">Mua</button>
          <button class="btn" onclick="openEgg()">Mở Trứng</button>
        </div>
      </div>
    </section>

    <!-- Hero -->
    <section id="tabHero" class="tab-content">
      <div class="card">
        <h2>Hero của bạn</h2>
        <div class="hero-list-container" id="heroListContainer">
          <!-- List heroes will be generated here -->
        </div>
      </div>
    </section>

    <!-- Wallet -->
    <section id="tabWallet" class="tab-content">
      <div class="card wallet-card">
        <h2>Wallet</h2>
        <div class="wallet-item">
          <span class="wallet-label">Số dư TON:</span>
          <span id="tonBalance">100</span>
        </div>
        <div class="wallet-item">
          <span class="wallet-label">Trứng đang có:</span>
          <span id="walletEggCount">0</span>
        </div>
        <div class="wallet-item">
          <span class="wallet-label">Số Hero:</span>
          <span id="walletHeroCount">0</span>
        </div>
      </div>
    </section>

    <!-- Referral -->
    <section id="tabReferral" class="tab-content">
      <div class="card">
        <h2>Referral</h2>
        <p>Chia sẻ link để nhận 10% TON khi có người mua trứng qua link của bạn.</p>
        <input type="text" id="refLink" value="https://t.me/DragonEggBot?start=refABC" readonly />
        <button class="btn" onclick="copyRefLink()">Copy Link</button>
        <button class="btn" onclick="shareRefLink()">Share Link</button>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal" id="heroModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeHeroModal()">X</button>
      <div id="heroModalContent">
        <!-- Hero details will be dynamically inserted here -->
      </div>
    </div>
  </div>

  <!-- JS DEMO -->
  <script>
    let totalEggs = 3000;
    let eggsLeft = 3000;
    let userEggs = [];
    let userHeroes = [];
    let userReferralTon = 0;
    let userTonBalance = 100;

    // Demo heroes
    userHeroes.push({
      heroId: 1,
      rarity: "Common",
      level: 1,
      stats: { "🗡": 60, "🛡": 50, "❤️": 200, "⚡": 15, "✨": 20 }
    });

    // Tăng chỉ số theo độ hiếm
    function increaseHeroStats(hero) {
      const rarityIncrease = {
        "Common": 10,
        "Uncommon": 20,
        "Rare": 40,
        "Epic": 80,
        "Legendary": 160
      };
      for (let key in hero.stats) {
        hero.stats[key] += rarityIncrease[hero.rarity] || 0;
      }
    }

    function openTab(evt, tabId) {
      const contents = document.getElementsByClassName("tab-content");
      for (let i = 0; i < contents.length; i++) {
        contents[i].classList.remove("active");
      }
      const tabBtns = document.getElementsByClassName("tab-btn");
      for (let i = 0; i < tabBtns.length; i++) {
        tabBtns[i].classList.remove("active");
      }
      document.getElementById(tabId).classList.add("active");
      evt.currentTarget.classList.add("active");
    }

    function buyEggs() {
      const qty = Number(document.getElementById('eggQuantity').value);
      if (eggsLeft <= 0) {
        alert("Trứng đã bán hết!");
        return;
      }
      if (qty < 1) {
        alert("Số lượng mua phải >= 1!");
        return;
      }
      if (qty > eggsLeft) {
        alert(Chỉ còn ${eggsLeft} trứng!);
        return;
      }
      eggsLeft -= qty;
      for (let i = 0; i < qty; i++) {
        userEggs.push({ eggId: userEggs.length + 1 });
      }
      alert(Bạn đã mua ${qty} trứng!);
      updateEggStatus();
      updateUserEggCount();
    }

    function openEgg() {
      if (userEggs.length < 1) {
        alert("Bạn không có trứng để mở!");
        return;
      }
      const egg = userEggs.shift(); // Lấy 1 trứng ra
      // Tạo hero mới random
      const newHero = createRandomHero();
      // Kiểm tra trùng độ hiếm
      const sameRarityHero = userHeroes.find(h => h.rarity === newHero.rarity);
      if (sameRarityHero) {
        // Nâng cấp hero cũ
        sameRarityHero.level++;
        increaseHeroStats(sameRarityHero);
        showHeroModal(sameRarityHero);
      } else {
        // Thêm hero mới
        newHero.heroId = userHeroes.length + 1;
        userHeroes.push(newHero);
        showHeroModal(newHero);
      }
      updateUserEggCount();
      updateHeroList();
    }

    function createRandomHero() {
      const rarities = ["Common", "Uncommon", "Rare", "Epic", "Legendary"];
      const randomNum = Math.random() * 100;
      let rarity = "Common";
      if (randomNum < 40) rarity = "Common";
      else if (randomNum < 70) rarity = "Uncommon";
      else if (randomNum < 90) rarity = "Rare";
      else if (randomNum < 98) rarity = "Epic";
      else rarity = "Legendary";

      const stats = {
        "🗡": Math.floor(Math.random() * 50) + 50,
        "🛡": Math.floor(Math.random() * 50) + 50,
        "❤️": Math.floor(Math.random() * 200) + 200,
        "⚡": Math.floor(Math.random() * 30) + 10,
        "✨": Math.floor(Math.random() * 40) + 20,
      };
      return {
        heroId: 0,
        rarity: rarity,
        level: 1,
        stats: stats
      };
    }

    function showHeroModal(hero) {
      const modal = document.getElementById('heroModal');
      const content = document.getElementById('heroModalContent');
      let rarityClass = getRarityClass(hero.rarity);

      let html = 
        <img src="https://via.placeholder.com/100?text=Hero" alt="Hero Image"/>
        <h3 class="${rarityClass}">Hero #${hero.heroId}</h3>
        <p class="${rarityClass}">Rarity: ${hero.rarity} (Cấp: ${hero.level})</p>
        <p>;
      for (let k in hero.stats) {
        html += ${k}${hero.stats[k]} ;
      }
      html += </p>;

      content.innerHTML = 
        <button class="modal-close" onclick="closeHeroModal()">X</button>
        ${html}
      ;
      modal.style.display = "flex";
    }

    function closeHeroModal() {
      const modal = document.getElementById('heroModal');
      modal.style.display = "none";
    }

    function getRarityClass(rarity) {
      switch(rarity) {
        case "Common": return "rarity-common";
        case "Uncommon": return "rarity-uncommon";
        case "Rare": return "rarity-rare";
        case "Epic": return "rarity-epic";
        case "Legendary": return "rarity-legendary";
        default: return "";
      }
    }

    function updateHeroList() {
      const container = document.getElementById('heroListContainer');
      container.innerHTML = "";

      const rarityOrder = ["Common", "Uncommon", "Rare", "Epic", "Legendary"];
      let sorted = [...userHeroes].sort((a, b) => {
        return rarityOrder.indexOf(a.rarity) - rarityOrder.indexOf(b.rarity);
      });

      sorted.forEach(hero => {
        let rarityClass = getRarityClass(hero.rarity);
        let div = document.createElement("div");
        div.className = "hero-card";
        div.onclick = () => showHeroDetailModal(hero.heroId);
        div.innerHTML = 
          <img src="https://via.placeholder.com/70?text=Hero" alt="Hero Image"/>
          <h4 class="${rarityClass}
