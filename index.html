<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>R&F Merge MiniApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* RESET */
    * {
      box-sizing: border-box;
      margin: 0; 
      padding: 0;
      font-family: sans-serif;
    }
    html, body {
      width: 100%; 
      height: 100%; 
      background: #000; 
      overflow: hidden;
    }
    /* LOADING SCREEN */
    #loadingScreen {
      position: fixed; 
      top: 0; left: 0; 
      width: 100vw; height: 100vh;
      background: url('https://i.imgur.com/gguz2yw.png') center/cover no-repeat;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: flex-end; 
      z-index: 99999;
    }
    #loadingLogo {
      margin-bottom: 20px;
      width: 120px; 
      height: 120px;
      background: url('https://i.imgur.com/4spxSKK.png') center/contain no-repeat;
    }
    #loadingBarOuter {
      width: 60%; 
      max-width: 300px; 
      height: 10px; 
      background: rgba(0,0,0,0.3);
      margin-bottom: 40px;
      border-radius: 5px; 
      overflow: hidden;
    }
    #loadingBarInner {
      width: 0%; 
      height: 100%; 
      background: #ff8800; 
      transition: width 0.2s;
    }

    /* MAIN APP */
    #app {
      display: none;
      position: relative;
      width: 100vw; 
      height: 100vh;
      background: #f5f5f5;
      overflow: hidden;
    }
    /* TOP NAV */
    #topBar {
      height: 50px; 
      background: #222;
      color: #fff;
      display: flex; 
      align-items: center; 
      justify-content: space-around;
    }
    #topBar .navBtn {
      cursor: pointer; 
      padding: 8px 14px; 
      border-radius: 4px;
      background: #333;
      margin: 0 6px;
      font-weight: bold;
      transition: background 0.2s;
    }
    #topBar .navBtn:hover {
      background: #444;
    }
    #topBar .navBtn.active {
      background: #ff7a00;
    }

    /* CONTENT */
    #contentArea {
      position: absolute; 
      top: 50px; 
      left: 0; 
      width: 100%; 
      height: calc(100% - 50px);
      overflow-y: auto; 
      background: #fff;
    }
    .tabPage {
      display: none; 
      padding: 10px;
    }
    .tabPage.show {
      display: block;
    }

    /* HERO GRID (4 columns, no gap) */
    #heroGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0; 
      /* no spacing around cards */
    }
    .heroCard {
      border: 1px solid #ddd;
      width: 100%;
      height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
    }
    .heroCard img {
      width: 50px; 
      height: 50px; 
      object-fit: cover; 
      border-radius: 4px;
    }
    .heroName {
      margin: 2px 0; 
      font-weight: bold;
    }
    .heroLv {
      margin-bottom: 2px;
      font-weight: bold;
    }
    .heroStats {
      font-size: 10px; 
      line-height: 1.2;
    }

    /* Rarity colors (bold) */
    .rarity-common { color: #999; font-weight:bold; }
    .rarity-rare { color: #0ff; font-weight:bold; }
    .rarity-epic { color: #c66cc5; font-weight:bold; }
    .rarity-legendary { color: #ffa600; font-weight:bold; }
    .rarity-mythic { color: #f00; font-weight:bold; }

    /* MODAL */
    #heroModalOverlay {
      position: fixed; 
      top: 0; left: 0; 
      width: 100vw; 
      height: 100vh; 
      background: rgba(0,0,0,0.5);
      display: none; 
      justify-content: center; 
      align-items: center;
      z-index: 999999;
    }
    #heroModal {
      background: #fff;
      border-radius: 6px;
      padding: 10px;
      width: 240px;
      text-align: center;
      position: relative;
    }
    #heroModal img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px; 
      margin-bottom: 8px;
    }
    #heroModalClose {
      position: absolute; 
      top: 5px; 
      right: 5px; 
      cursor: pointer; 
      background: #ddd; 
      border: none; 
      border-radius: 4px; 
      padding: 2px 6px;
    }

    /* House style placeholder */
    .houseList {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .houseItem {
      border: 1px solid #ccc;
      padding: 6px;
      display: flex; 
      align-items: center; 
      justify-content: space-between;
    }
    .houseItem button {
      background: #f57c00; 
      color:#fff; 
      border:none; 
      border-radius:4px; 
      padding:4px 8px; 
      cursor:pointer;
      font-weight:bold;
    }

    /* WALLET: REF, SETTINGS inside, per request */
    #walletSection {
      display: flex; 
      flex-direction: column; 
      gap: 10px;
    }
    .refBox, .settingsBox {
      border:1px solid #ccc; 
      padding:8px; 
      border-radius:4px;
    }
    .refBox button, .settingsBox button {
      background:#f57c00; 
      color:#fff; 
      border:none; 
      padding:4px 8px; 
      border-radius:4px; 
      margin:4px;
      cursor:pointer;
      font-weight: bold;
    }
    /* Monsters on home (farm) */
    #monsterList {
      display:flex; 
      flex-wrap:wrap; 
      gap:6px;
    }
    .monsterCard {
      border:1px solid #ccc; 
      width:90px; 
      height:100px; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      justify-content:center; 
      font-size:12px;
      text-align:center;
      border-radius:6px;
    }
    .monsterCard button {
      background:#e00; 
      color:#fff; 
      border:none; 
      border-radius:4px; 
      padding:2px 4px; 
      margin-top:4px; 
      cursor:pointer;
      font-weight:bold;
    }
  </style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <div id="loadingLogo"></div>
  <div id="loadingBarOuter">
    <div id="loadingBarInner"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- NAV -->
  <div id="topBar">
    <div class="navBtn" data-tab="tabHome">🏠 Home</div>
    <div class="navBtn" data-tab="tabHero">⚔ Hero</div>
    <div class="navBtn" data-tab="tabShop">🏷 Shop</div>
    <div class="navBtn" data-tab="tabWallet">💰 Wallet</div>
  </div>

  <!-- CONTENT -->
  <div id="contentArea">
    <!-- HOME -->
    <div id="tabHome" class="tabPage show">
      <!-- Farm (monster) -->
      <div id="monsterList"></div>
      <!-- Token display -->
      <p id="tokenDisplay" style="font-weight:bold;margin-top:10px;"></p>
    </div>

    <!-- HERO -->
    <div id="tabHero" class="tabPage">
      <div id="heroGrid"></div>
    </div>

    <!-- SHOP -->
    <div id="tabShop" class="tabPage">
      <div style="display:flex;gap:8px;">
        <button onclick="buyChest(1)" style="font-weight:bold;">⏳ x1</button>
        <button onclick="buyChest(5)" style="font-weight:bold;">⏳ x5</button>
      </div>
      <hr>
      <!-- 3 House -->
      <div class="houseList">
        <div class="houseItem">
          <span><b>Tiny House</b> (20 TON)</span>
          <button onclick="buyHouse('Tiny House',20)">Purchase House</button>
        </div>
        <div class="houseItem">
          <span><b>Pen House</b> (50 TON)</span>
          <button onclick="buyHouse('Pen House',50)">Purchase House</button>
        </div>
        <div class="houseItem">
          <span><b>Villa</b> (100 TON)</span>
          <button onclick="buyHouse('Villa',100)">Purchase House</button>
        </div>
      </div>
    </div>

    <!-- WALLET -->
    <div id="tabWallet" class="tabPage">
      <div id="walletSection">
        <!-- REF -->
        <div class="refBox">
          <h4>Referral</h4>
          <p>Gain 10% in TON from each invited friend.</p>
          <p>Link: <span id="refLink">https://t.me/RF_ProBot?start=111</span></p>
          <button onclick="copyRef()">Copy</button>
          <button onclick="shareRef()">Share</button>
          <hr>
          <button onclick="withdrawRef()">Withdraw REF</button>
        </div>
        <!-- WALLET main (Withdraw, Swap) -->
        <div class="refBox">
          <h4>Wallet</h4>
          <button onclick="withdrawMain()">Withdraw</button>
          <button onclick="swapMain()">Swap</button>
        </div>
        <!-- SETTINGS (sound on/off) -->
        <div class="settingsBox">
          <h4>Settings</h4>
          <label style="margin-right:8px;">
            Sound:
            <select id="soundToggle" onchange="toggleSound()">
              <option value="on">On</option>
              <option value="off">Off</option>
            </select>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- HERO MODAL -->
<div id="heroModalOverlay">
  <div id="heroModal">
    <button id="heroModalClose" onclick="closeHeroModal()">X</button>
    <img id="heroModalImg" src="" alt="hero">
    <h4 id="heroModalName" style="margin:4px 0;"></h4>
    <p id="heroModalLv" style="margin:4px 0;"></p>
    <p id="heroModalStats" style="margin:4px 0;"></p>
    <p id="heroModalElement" style="margin:4px 0;"></p>
  </div>
</div>

<script>
/* LOADING 3s */
let loadPct=0;
const loadInterval=setInterval(()=>{
  loadPct+=5;
  if(loadPct>100) loadPct=100;
  document.getElementById('loadingBarInner').style.width=loadPct+'%';
},200);

setTimeout(()=>{
  clearInterval(loadInterval);
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('app').style.display='block';
},3000);

/* BASIC DATA */
let token=100; 
document.getElementById('tokenDisplay').innerText="💎 "+token;
let heroList=[];
let isSoundOn=true;

/* NAV switch */
document.querySelectorAll('#topBar .navBtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    let tab=btn.getAttribute('data-tab');
    document.querySelectorAll('.tabPage').forEach(pg=>pg.classList.remove('show'));
    document.querySelectorAll('.navBtn').forEach(x=>x.classList.remove('active'));
    document.getElementById(tab).classList.add('show');
    btn.classList.add('active');
    if(tab==='tabHero') renderHeroes();
  });
});

let monsters=[
  {id:1,name:"Worm",hp:20, reward:5},
  {id:2,name:"Shroom",hp:30,reward:7},
  {id:3,name:"AngryCrab",hp:40,reward:10},
];
function renderMonsters(){
  let ml=document.getElementById('monsterList');
  ml.innerHTML="";
  monsters.forEach(m=>{
    let div=document.createElement('div');
    div.classList.add('monsterCard');
    div.innerHTML=`
      <b>${m.name}</b><br>
      HP:${m.hp}<br>
      <button>Attack</button>
    `;
    div.querySelector("button").onclick=()=>{
      attackMonster(m);
    };
    ml.appendChild(div);
  });
}
